// Estimasi kondisi & rekomendasi dari salah satu nilai PCI/SDI/IKP.
// PCI & IKP: 0-100, makin tinggi makin baik. SDI: makin rendah makin baik.
function estimasiKondisi(pci, sdi, ikp){
  let val=null, mode=null;
  if(pci!==null && pci!==undefined && pci!==''){ val=Number(pci); mode='pci'; }
  else if(ikp!==null && ikp!==undefined && ikp!==''){ val=Number(ikp); mode='ikp'; }
  else if(sdi!==null && sdi!==undefined && sdi!==''){ val=Number(sdi); mode='sdi'; }
  if(val===null || isNaN(val)) return null;
  let kondisi;
  if(mode==='sdi'){
    if(val<=25) kondisi='baik'; else if(val<=50) kondisi='sedang'; else if(val<=100) kondisi='rusak_ringan'; else kondisi='rusak_berat';
  } else {
    if(val>=85) kondisi='baik'; else if(val>=70) kondisi='sedang'; else if(val>=55) kondisi='rusak_ringan'; else kondisi='rusak_berat';
  }
  return {kondisi, rekomendasi: REKOMENDASI_MAP[kondisi]};
}

// --- 3. PARSER WKB HEX -> GEOJSON (ringan, tanpa dependensi) --------------
function wkbHexToLatLngs(hex){
  if(!hex) return null;
  try{
    const bytes = new Uint8Array(hex.match(/../g).map(b=>parseInt(b,16)));
    let off = 0;
    const little = bytes[off] === 1; off += 1;
    const readU32 = () => { const v = little ? new DataView(bytes.buffer).getUint32(off,true) : new DataView(bytes.buffer).getUint32(off,false); off+=4; return v; };
    const readF64 = () => { const v = little ? new DataView(bytes.buffer).getFloat64(off,true) : new DataView(bytes.buffer).getFloat64(off,false); off+=8; return v; };
    let type = readU32();
    if(type & 0x20000000){ readU32(); type = type & ~0x20000000; }
    type = type & 0xff;
    if(type === 1){ const x=readF64(), y=readF64(); return {type:'Point', coords:[y,x]}; }
    if(type === 2){ const n=readU32(); const pts=[]; for(let i=0;i<n;i++){ const x=readF64(), y=readF64(); pts.push([y,x]); } return {type:'LineString', coords:pts}; }
    return null;
  }catch(e){ return null; }
}

async function loadProfile(userId){
  const {data,error} = await sb.from('profiles').select('*').eq('id',userId).single();
  if(error){ console.warn(error); return null; }
  return data;
}
async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ state.user = session.user; state.profile = await loadProfile(session.user.id); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN'){ state.user = session.user; state.profile = await loadProfile(session.user.id); render(); }

}

        </div>
        <div class="roadruler">
          <div class="lane"></div>
          ${(()=>{ let left=0; return KONDISI_ORDER.slice().reverse().map(k=>{ const pct = kondisiTotals[k]/kondisiSum*100; const html = pct>0 ? `<div class="seg" style="left:${left}%;width:${pct}%;background:${KONDISI_COLOR[k]}"></div>` : ''; left+=pct; return html; }).join(''); })()}
        </div>
        <div class="flex flex-wrap gap-4 mt-3">
          ${KONDISI_ORDER.map(k=>`<div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:${KONDISI_COLOR[k]}"></span>${KONDISI_LABEL[k]} · ${fmtNum(kondisiTotals[k]/kondisiSum*100,1)}%</div>`).join('')}
        </div>
      </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${kpiCard('Total Ruas Jalan', fmtNum(ruas.length), 'road', `${kabupaten.length} kabupaten/kota`)}
      ${kpiCard('Panjang Jaringan', fmtNum(totalKm,1)+' km', 'map', 'Terdaftar dalam sistem')}
      ${kpiCard('Pagu Anggaran '+thisYear, fmtRp(pagu), 'wallet', pagu>0? fmtNum(realisasi/pagu*100,1)+'% terealisasi':'Belum ada data')}

      <div class="card p-5">
        <h3 class="font-display font-bold text-[15px] mb-4">Kondisi Jalan per Kabupaten/Kota</h3>

        <div style="height:320px"><canvas id="chart-anggaran"></canvas></div>

      data: kabNames.map(kb => { const row = rekapKondisi.find(r=>r.kabupaten===kb && r.kondisi===k); return row? Number(row.total_panjang_km) : 0; })
    }));
    mkChart('chart-kondisi', 'bar', {labels:kabNames, datasets:dsKondisi}, {
      plugins:{legend:{display:false}}, scales:{x:{stacked:true, ticks:{font:{size:10}}}, y:{stacked:true, title:{display:true,text:'km'}}}
    });

    // Chart: anggaran per tahun (grouped bar pagu vs realisasi)
    const tahunList = [...new Set(rekapAnggaran.map(r=>r.tahun))].sort();
    const paguPerTahun = tahunList.map(t => rekapAnggaran.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_pagu||0),0));
    const realPerTahun = tahunList.map(t => rekapAnggaran.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_realisasi||0),0));

function kpiCard(label, value, iconName, sub){
  return `<div class="card p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11.5px] font-semibold text-ink-500 uppercase tracking-wide">${label}</span>
      <span class="text-navy-700">${icon(iconName,'w-4 h-4')}</span>
    </div>
    <div class="font-display font-extrabold text-[22px] text-ink-900">${value}</div>
    <div class="text-[11.5px] text-ink-400 mt-0.5">${sub}</div>
  </div>`;
}
function mkChart(canvasId, type, data, extraOptions={}){
  if(state.charts[canvasId]) state.charts[canvasId].destroy();
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  state.charts[canvasId] = new Chart(ctx, {type, data, options: Object.assign({responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}}}, extraOptions)});
}
function emptyStateNotice(){
  return `<div class="card p-5 mt-5 flex items-start gap-3 border-dashed">
    <span class="text-accent-dark mt-0.5">${icon('alert','w-5 h-5')}</span>
    <div><div class="font-semibold text-[13.5px]">Data survei &amp; anggaran belum lengkap</div>
    <p class="text-[13px] text-ink-500 mt-0.5">Grafik akan terisi otomatis setelah data survei kondisi dan anggaran tahunan mulai diinput oleh petugas.</p></div>
  </div>`;
}
function errorPanel(err){
  return `<div class="card p-6 border-[var(--bad)]"><div class="font-semibold text-[var(--bad)] mb-1">Gagal memuat data</div><p class="text-[13px] text-ink-500 font-mono">${(err&&err.message)||err}</p></div>`;

async function viewPeta(){
  const v = document.getElementById('view');
  v.innerHTML = `
  <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Peta Jaringan Jalan</h1>
  <p class="text-ink-500 text-[13.5px]">Sebaran ruas jalan, diwarnai berdasarkan kondisi terkini</p></div>
  <div class="card p-3">
    <div id="map" style="height:560px;"></div>
  </div>
  <div class="flex flex-wrap gap-4 mt-3">
    ${KONDISI_ORDER.map(k=>`<div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:${KONDISI_COLOR[k]}"></span>${KONDISI_LABEL[k]}</div>`).join('')}
    <div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:#8896AC"></span>Belum disurvei</div>
  </div>
  <div id="map-empty" class="hidden mt-4">${emptyStateMap()}</div>`;

  if(state.map){ state.map.remove(); state.map = null; }
  const map = L.map('map', {scrollWheelZoom:true}).setView([-9.6, 121.0], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap contributors', maxZoom:18}).addTo(map);
  state.map = map;
  const layerGroup = L.layerGroup().addTo(map);

  try{
    const [ruas, kondisi] = await Promise.all([api.ruasList(), api.kondisiTerkini()]);
    // worst kondisi per ruas
    const worstByRuas = {};
    kondisi.forEach(row=>{
      const cur = worstByRuas[row.ruas_id];
      if(!cur || KONDISI_ORDER.indexOf(row.kondisi) < KONDISI_ORDER.indexOf(cur)) worstByRuas[row.ruas_id] = row.kondisi;
    });
    let drawn = 0;
    const bounds = [];
    ruas.forEach(r=>{
      const parsed = wkbHexToLatLngs(r.geom);
      if(!parsed) return;
      const kondisi = worstByRuas[r.id];
      const color = kondisi ? KONDISI_COLOR[kondisi] : '#8896AC';
      let layer;
      if(parsed.type === 'LineString'){ layer = L.polyline(parsed.coords, {color, weight:5, opacity:.85}); parsed.coords.forEach(c=>bounds.push(c)); }
      else { layer = L.circleMarker(parsed.coords, {radius:7, color, fillColor:color, fillOpacity:.9}); bounds.push(parsed.coords); }
      layer.bindPopup(`<b class="font-mono">${r.kode_ruas}</b><br>${r.nama_ruas}<br><span style="color:${color}">${kondisi?KONDISI_LABEL[kondisi]:'Belum disurvei'}</span> · ${fmtNum(r.panjang_km,1)} km`);
      layer.on('click', ()=>{ state.selectedRuasId = r.id; state.route='ruas'; renderShell(); });
      layer.addTo(layerGroup);
      drawn++;
    });
    if(drawn > 0 && bounds.length){ map.fitBounds(bounds, {padding:[30,30]}); }
    else { document.getElementById('map-empty').classList.remove('hidden'); }
  }catch(err){ v.insertAdjacentHTML('beforeend', errorPanel(err)); }
}
function emptyStateMap(){
  return `<div class="card p-5 flex items-start gap-3 border-dashed">
    <span class="text-accent-dark mt-0.5">${icon('map','w-5 h-5')}</span>
    <div><div class="font-semibold text-[13.5px]">Belum ada geometri ruas jalan</div>
    <p class="text-[13px] text-ink-500 mt-0.5">Kolom <code class="font-mono">geom</code> pada tabel ruas_jalan / segmen_jalan masih kosong. Setelah data spasial (LineString) diisi lewat Table Editor atau GIS, ruas akan otomatis tampil di peta ini.</p></div>
  </div>`;
}

    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Daftar Ruas Jalan</h1>

    </div>
    <div class="card overflow-x-auto">

    </div>
    <div id="ruas-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Tidak ada ruas yang cocok dengan filter.</div>`;

    function renderRows(){
      const q = document.getElementById('f-search').value.toLowerCase();
      const kab = document.getElementById('f-kabupaten').value;
      const st = document.getElementById('f-status').value;
      const kd = document.getElementById('f-kondisi').value;
      const rows = ruas.filter(r=>{
        if(q && !(r.kode_ruas?.toLowerCase().includes(q) || r.nama_ruas?.toLowerCase().includes(q))) return false;
        if(kab && r.kabupaten_id !== kab) return false;
        if(st && r.status_jalan !== st) return false;
        if(kd && worstByRuas[r.id] !== kd) return false;
        return true;
      });
      const tbody = document.getElementById('ruas-tbody');
      tbody.innerHTML = rows.map(r=>`
        <tr class="row-hover" data-id="${r.id}">
          <td class="font-mono text-[12.5px] text-navy-700 font-semibold">${r.kode_ruas}</td>

          <td>${badge(worstByRuas[r.id])}</td>

      tbody.querySelectorAll('tr').forEach(tr=>tr.addEventListener('click', ()=>{ state.selectedRuasId = tr.dataset.id; renderShell(); }));
    }
    ['f-search','f-kabupaten','f-status','f-kondisi'].forEach(id=>document.getElementById(id).addEventListener('input', renderRows));
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-ruas').addEventListener('click', ()=>openRuasFormModal(kabupaten)); }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

  const overlay = el(`<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4"></div>`);
  overlay.innerHTML = `<div class="card w-full ${widthClass} max-h-[88vh] overflow-y-auto p-6 relative">${innerHtml}</div>`;

      const total = g.items.length, done = g.items.filter(it=>it.status==='sudah').length;
      return `<button data-idx="${i}" class="dok-item w-full text-left px-4 py-3 border-b border-line hover:bg-[#F8FAFD] block">
        <div class="flex items-center justify-between"><span class="text-[11.5px] text-ink-400">${fmtDate(g.tanggal)}</span><span class="font-mono text-[10.5px] text-ink-400">${done}/${total}</span></div>
        <div class="font-semibold text-[13px]">${g.ruas}</div>
        <div class="text-[12px] text-ink-500 capitalize">${JENIS_PENANGANAN_LABEL[g.jenis]||(g.jenis||'').replaceAll('_',' ')}${g.sub? ' · '+g.sub : ''}</div>
      </button>`;
    }).join('');

    function renderDetail(idx){
      const g = list[idx];
      sidebar.querySelectorAll('.dok-item').forEach(b=>b.classList.toggle('bg-[#EEF3FA]', Number(b.dataset.idx)===idx));
      const byTahap = {};
      g.items.forEach(it=>{ (byTahap[it.tahap_urutan] ||= {nama:it.tahap_nama, items:[]}).items.push(it); });
      const tahapKeys = Object.keys(byTahap).sort((a,b)=>a-b);
      const detail = document.getElementById('dok-detail');
      detail.innerHTML = `
        <div class="mb-4 flex items-start justify-between flex-wrap gap-2">
          <div>
            <div class="text-[11.5px] text-ink-400">${fmtDate(g.tanggal)}</div>
            <div class="font-display font-bold text-[16px]">${g.ruas}</div>
            <div class="text-[13px] text-ink-500 capitalize">${JENIS_PENANGANAN_LABEL[g.jenis]||(g.jenis||'').replaceAll('_',' ')}${g.sub? ' · '+g.sub : ''}</div>
          </div>
        </div>
        <div class="flex gap-3 overflow-x-auto pb-2">
        ${tahapKeys.map(tk=>`
          <div class="border border-line rounded-lg p-3 shrink-0" style="width:230px">
            <div class="font-display font-bold text-[12px] text-navy-700 mb-2 uppercase">Tahap ${tk}<div class="font-normal normal-case text-ink-500 text-[11px]">${byTahap[tk].nama}</div></div>
            <div class="space-y-2.5">
            ${byTahap[tk].items.map(it=>`
              <div class="text-[12px]">
                <div class="flex items-start gap-1.5">
                  ${it.status==='sudah'? `<span class="text-[var(--good)] shrink-0">✓</span>` : `<span class="text-ink-300 shrink-0">○</span>`}
                  <span class="${it.status==='sudah'?'text-ink-700':'text-ink-500'}">${it.nama_dokumen}</span>
                </div>
                ${it.status==='sudah'
                  ? `<div class="flex items-center gap-2 mt-0.5 ml-5"><a href="${it.link_dokumen}" target="_blank" rel="noopener" class="text-navy-600 text-[11px] underline truncate max-w-[110px]">Lihat</a><button data-dok="${it.dokumen_id}" class="dok-edit text-[11px] text-ink-400 hover:text-navy-700">Ubah</button></div>`
                  : `<button data-dok="${it.dokumen_id}" class="dok-add text-[11px] text-navy-700 font-semibold ml-5 mt-0.5">+ Tambah</button>`}
              </div>`).join('')}
            </div>
          </div>`).join('')}
        </div>`;
      detail.querySelectorAll('.dok-add, .dok-edit').forEach(btn=>btn.addEventListener('click', ()=>{
        const item = g.items.find(x=>x.dokumen_id===btn.dataset.dok);
        openDokumenLinkModal(g, item, ()=>viewDokumen());
      }));
    }
    sidebar.querySelectorAll('.dok-item').forEach(b=>b.addEventListener('click', ()=>renderDetail(Number(b.dataset.idx))));
    if(list.length) renderDetail(0);
  }catch(err){ v.innerHTML = errorPanel(err); }
}

function openDokumenLinkModal(group, item, onDone){
  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>
    <h3 class="font-display font-extrabold text-lg mb-1">Sematkan Link Dokumen</h3>
    <p class="text-[12px] text-ink-500 mb-4">Tempelkan link Google Drive / URL untuk dokumen berikut.</p>
    <div class="text-[12.5px] bg-[#F8FAFD] border border-line rounded-lg p-3 mb-4 space-y-0.5">
      <div><span class="text-ink-400">Ruas:</span> <b>${group.ruas}</b></div>
      <div><span class="text-ink-400">Tahap ${item.tahap_urutan}:</span> ${item.tahap_nama}</div>
      <div><span class="text-ink-400">Kegiatan:</span> <span class="capitalize">${JENIS_PENANGANAN_LABEL[group.jenis]||(group.jenis||'').replaceAll('_',' ')}</span>${group.sub? ' · '+group.sub:''}</div>
      <div><span class="text-ink-400">Dokumen:</span> <b>${item.nama_dokumen}</b></div>
    </div>
    <form id="form-dok" class="space-y-3">
      <div><label class="text-[12.5px] font-semibold text-ink-600">Link Dokumen (Google Drive / URL) *</label><input id="dl-link" required placeholder="https://drive.google.com/..." value="${item.link_dokumen||''}"></div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Keterangan</label><textarea id="dl-ket" rows="2">${item.dok_keterangan||''}</textarea></div>
      <div id="dl-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <div class="flex justify-end gap-2 pt-1"><button type="button" data-close class="btn-ghost">Batal</button><button type="submit" class="btn-primary">Simpan</button></div>
    </form>`);
  overlay.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', ()=>overlay.remove()));
  overlay.querySelector('#form-dok').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#dl-err');
    try{
      await api.updateDokumen(item.dokumen_id, {
        link_dokumen: overlay.querySelector('#dl-link').value,
        keterangan: overlay.querySelector('#dl-ket').value || null,
        status: 'sudah', uploaded_by: state.user.id, tanggal_update: new Date().toISOString(),
      });
      overlay.remove(); onDone && onDone();
    }catch(err){ errBox.textContent = err.message; errBox.classList.remove('hidden'); }
  });
}

// --- 12. VIEW: ANGGARAN ---------------------------------------------------
async function viewAnggaran(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-72 w-full mb-5"></div><div class="skel h-96 w-full"></div>`;
  try{
    const rekap = await api.rekapAnggaran();
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Anggaran &amp; Realisasi</h1>
    <p class="text-ink-500 text-[13.5px]">Rekap pagu dan realisasi anggaran penanganan jalan per tahun</p></div>
    <div class="card p-5 mb-5"><div style="height:300px"><canvas id="chart-angg-detail"></canvas></div></div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Tahun</th><th>Sumber Dana</th><th>Pagu</th><th>Realisasi</th><th>% Realisasi</th></tr></thead>
      <tbody>${rekap.length? rekap.map(r=>`
        <tr><td class="font-mono font-semibold">${r.tahun}</td><td>${(r.sumber_dana||'—').replaceAll('_',' ')}</td>
        <td class="font-mono">${fmtRp(r.total_pagu)}</td><td class="font-mono">${fmtRp(r.total_realisasi)}</td>
        <td><div class="flex items-center gap-2"><div class="w-24 h-1.5 bg-line rounded-full overflow-hidden"><div class="h-full bg-navy-700" style="width:${Math.min(r.persen_realisasi||0,100)}%"></div></div><span class="font-mono text-[12.5px]">${fmtNum(r.persen_realisasi,1)}%</span></div></td></tr>`).join('')
        : `<tr><td colspan="5" class="text-center text-ink-400 py-8">Belum ada data anggaran tahunan.</td></tr>`}
      </tbody></table>
    </div>`;
    if(rekap.length){
      const tahunList = [...new Set(rekap.map(r=>r.tahun))].sort();
      mkChart('chart-angg-detail','line',{labels:tahunList, datasets:[
        {label:'Pagu', data:tahunList.map(t=>rekap.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_pagu||0),0)), borderColor:'#16385E', backgroundColor:'#16385E22', fill:true, tension:.3},
        {label:'Realisasi', data:tahunList.map(t=>rekap.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_realisasi||0),0)), borderColor:'#F2A93B', backgroundColor:'#F2A93B33', fill:true, tension:.3},
      ]}, {scales:{y:{ticks:{callback:v=>fmtRp(v)}}}});
    }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 13. VIEW: BENCANA -----------------------------------------------------
async function viewBencana(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-96 w-full"></div>`;
  try{
    const data = await api.bencana();
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Kejadian Bencana</h1>
    <p class="text-ink-500 text-[13.5px]">Catatan longsor, banjir, dan kejadian lain yang berdampak pada ruas jalan</p></div>
    <div class="space-y-3">
      ${data.length? data.map(b=>`
        <div class="card p-4 flex items-start gap-4">
          <div class="w-10 h-10 rounded-lg bg-[#FBE4E4] flex items-center justify-center text-[var(--bad)] shrink-0">${icon('alert','w-5 h-5')}</div>
          <div class="flex-1">
            <div class="flex items-center justify-between flex-wrap gap-2">
              <span class="font-semibold text-[13.5px] capitalize">${(b.jenis_kejadian||'—').replaceAll('_',' ')}</span>
              <span class="font-mono text-[11.5px] text-ink-400">${fmtDate(b.tanggal_kejadian)}</span>
            </div>
            <div class="text-[12.5px] text-ink-500 mt-0.5">${b.segmen_jalan?.ruas_jalan?.nama_ruas || '—'} ${b.segmen_jalan?.kode_segmen? '· '+b.segmen_jalan.kode_segmen : ''}</div>
            ${b.deskripsi? `<p class="text-[13px] text-ink-600 mt-1.5">${b.deskripsi}</p>`:''}
            ${b.tingkat_kerusakan? `<span class="badge ${b.tingkat_kerusakan==='putus_total'||b.tingkat_kerusakan==='berat'?'badge-rusak_berat':'badge-sedang'} mt-2 capitalize">${b.tingkat_kerusakan.replaceAll('_',' ')}</span>`:''}
          </div>
        </div>`).join('') : `<div class="card p-10 text-center text-ink-400 text-[13.5px]">Belum ada kejadian bencana yang tercatat.</div>`}
    </div>`;
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 14. VIEW: ADMIN (Pengguna) -------------------------------------------
async function viewAdmin(){
  const v = document.getElementById('view');
  if(!isAdmin()){ v.innerHTML = `<div class="card p-8 text-center text-ink-400">Halaman ini khusus administrator.</div>`; return; }
  v.innerHTML = `<div class="skel h-96 w-full"></div>`;
  try{
    const profiles = await api.profiles();
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Manajemen Pengguna</h1>
    <p class="text-ink-500 text-[13.5px]">Kelola peran akses seluruh pengguna sistem</p></div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Nama</th><th>NIP</th><th>Wilayah</th><th>Peran</th></tr></thead>
      <tbody>${profiles.map(p=>`
        <tr><td class="font-medium">${p.nama}${p.id===state.user.id?' <span class="text-[11px] text-ink-400">(Anda)</span>':''}</td>
        <td class="font-mono text-[12.5px] text-ink-500">${p.nip||'—'}</td>
        <td class="text-ink-500">${p.kabupaten?.nama||'Seluruh Provinsi'}</td>
        <td><select data-id="${p.id}" class="role-select max-w-[180px]" ${p.id===state.user.id?'disabled':''}>
          ${Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select></td></tr>`).join('')}
      </tbody></table>
    </div>`;
    v.querySelectorAll('.role-select').forEach(sel=>sel.addEventListener('change', async ()=>{
      try{ await api.updateRole(sel.dataset.id, sel.value); }
      catch(err){ alert('Gagal memperbarui peran: '+err.message); }
    }));
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 15. BOOTSTRAP ----------------------------------------------------------
function render(){
  if(!state.user){ renderLogin(); } else { renderShell(); }
}
initAuth();
