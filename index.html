      if(!parsed || parsed.type !== 'LineString') return null;
      const coords = parsed.coords.filter(c=>Array.isArray(c) && Number.isFinite(c[0]) && Number.isFinite(c[1]));
      return coords.length>=2 ? {r, coords} : null;
    }
    // worst kondisi per ruas
    const worstByRuas = {};
    kondisi.forEach(row=>{
      const cur = worstByRuas[row.ruas_id];
      if(!cur || KONDISI_ORDER.indexOf(row.kondisi) < KONDISI_ORDER.indexOf(cur)) worstByRuas[row.ruas_id] = row.kondisi;
    });
    // skor prioritas tertinggi per ruas (satu ruas bisa punya beberapa segmen/baris skor)
    const skorByRuas = {};
    skorList.forEach(row=>{
      const cur = skorByRuas[row.ruas_id];
      if(cur==null || Number(row.skor_prioritas) > cur) skorByRuas[row.ruas_id] = Number(row.skor_prioritas);
    });

    let mode = 'kondisi';
    let drawn = 0;

    function draw(){
      layerGroup.clearLayers();
      drawn = 0;
      const bounds = [];
      const skippedRuas = [];
      ruas.forEach(r=>{
        try{
          const parsed = geomToLatLngs(r.geom);
          if(!parsed) return;
          // --- validasi: buang koordinat NaN dan titik duplikat berurutan ---
          const isValidLatLng = c => Array.isArray(c) && Number.isFinite(c[0]) && Number.isFinite(c[1]);
          if(parsed.type === 'LineString'){
            const valid = parsed.coords.filter(isValidLatLng);
            const dedup = valid.filter((c,i)=> i===0 || c[0]!==valid[i-1][0] || c[1]!==valid[i-1][1]);
            if(dedup.length < 2) return; // garis "nol panjang" / data cacat, lewati
            parsed.coords = dedup;
          } else if(parsed.type === 'Point'){
            if(!isValidLatLng(parsed.coords)) return;
          } else return;
          let color, popupInfo;
          if(mode === 'kondisi'){
            const k = worstByRuas[r.id];
            color = k ? KONDISI_COLOR[k] : '#8896AC';
            popupInfo = `<span style="color:${color}">${k?KONDISI_LABEL[k]:'Belum disurvei'}</span>`;
          } else {
            const skor = skorByRuas[r.id];
            color = skorToColor(skor);
            popupInfo = skor!=null ? `<span style="color:${color}">Skor prioritas: ${fmtNum(skor,1)}</span>` : `<span style="color:${color}">Belum ada skor prioritas</span>`;
          }
          let layer;
          if(parsed.type === 'LineString'){ layer = L.polyline(parsed.coords, {color, weight:5, opacity:.85}); parsed.coords.forEach(c=>bounds.push(c)); }
          else { layer = L.circleMarker(parsed.coords, {radius:7, color, fillColor:color, fillOpacity:.9}); bounds.push(parsed.coords); }
          layer.bindPopup(`<b class="font-mono">${r.kode_ruas}</b><br>${r.nama_ruas}<br>${popupInfo} · ${fmtNum(r.panjang_km,1)} km`);
          layer.on('click', ()=>{ state.selectedRuasId = r.id; state.route='ruas'; renderShell(); });
          layer.addTo(layerGroup);
          drawn++;
        }catch(e){
          skippedRuas.push(r.kode_ruas || r.id);
          console.warn('Peta: lewati ruas bermasalah ->', r.kode_ruas || r.id, e);
        }
      });
      if(skippedRuas.length){
        console.warn(`Peta: ${skippedRuas.length} ruas dilewati karena data geometri bermasalah:`, skippedRuas);
      }
      if(drawn > 0 && bounds.length){
        try{ map.fitBounds(bounds, {padding:[30,30]}); }
        catch(e){ console.warn('fitBounds gagal, pakai tampilan default NTT.', e); map.setView([-9.6, 121.0], 8); }
        document.getElementById('map-empty').classList.add('hidden');
      }
      else { document.getElementById('map-empty').classList.remove('hidden'); }
    }

    function drawJembatan(){
      jembatanLayerGroup.clearLayers();
      jembatan.forEach(j=>{
        try{
          const parsed = geomToLatLngs(j.geom);
          if(!parsed || parsed.type !== 'Point') return;
          const [lat, lng] = parsed.coords;
          if(!Number.isFinite(lat) || !Number.isFinite(lng)) return;
          const color = j.kondisi ? KONDISI_COLOR[j.kondisi] : '#8896AC';
          const divIcon = L.divIcon({
            className: '',
            html: `<div style="background:${color};width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.35);border:2px solid #fff;color:#fff">${icon('bridge','w-3 h-3')}</div>`,
            iconSize: [22,22], iconAnchor: [11,11],
          });
          const marker = L.marker([lat, lng], {icon: divIcon});
          marker.bindPopup(`<b>${j.nama_jembatan}</b><br>Ruas: ${j.ruas_jalan?.nama_ruas||'—'}<br>Kondisi: <span style="color:${color}">${j.kondisi?KONDISI_LABEL[j.kondisi]:'Belum tercatat'}</span>${j.panjang_m?`<br>Panjang: ${fmtNum(j.panjang_m,1)} m`:''}`);
          marker.addTo(jembatanLayerGroup);
        }catch(e){ console.warn('Peta: lewati jembatan bermasalah ->', j.nama_jembatan || j.id, e); }
      });
    }

    function drawBencana(){
      bencanaLayerGroup.clearLayers();
      const byRuas = {};
      bencanaList.forEach(b=>{ if(!b.ruas_id) return; (byRuas[b.ruas_id] = byRuas[b.ruas_id] || []).push(b); });
      Object.entries(byRuas).forEach(([ruasId, items])=>{
        try{
          const line = ruasLineCoords(ruasId);
          if(!line) return;
          const sorted = [...items].sort((a,b)=>(a.tanggal_kejadian||'').localeCompare(b.tanggal_kejadian||''));
          sorted.forEach((b,i)=>{
            const frac = (i+1)/(sorted.length+1);
            const pt = pointAlongLine(line.coords, frac);
            if(!pt) return;
            const berat = b.tingkat_kerusakan==='berat' || b.tingkat_kerusakan==='putus_total';
            const color = berat ? '#C43D3D' : (b.tingkat_kerusakan==='sedang' ? '#E0672B' : '#8896AC');
            const divIcon = L.divIcon({
              className: '',
              html: `<div style="background:${color};width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.35);border:2px solid #fff;color:#fff">${icon('alert','w-3 h-3')}</div>`,
              iconSize: [20,20], iconAnchor: [10,10],
            });
            const marker = L.marker(pt, {icon: divIcon});
            marker.bindPopup(`<b class="capitalize">${(b.jenis_kejadian||'—').replaceAll('_',' ')}</b><br>${line.r.kode_ruas} — ${line.r.nama_ruas}<br>${fmtDate(b.tanggal_kejadian)}${b.tingkat_kerusakan?`<br>Kerusakan: <span style="color:${color}">${b.tingkat_kerusakan.replaceAll('_',' ')}</span>`:''}<br><span style="color:#8896AC;font-size:11px">Posisi perkiraan di sepanjang ruas</span>`);
            marker.addTo(bencanaLayerGroup);
          });
        }catch(e){ console.warn('Peta: lewati bencana pada ruas ->', ruasId, e); }
      });
    }

    function drawLalin(){
      lalinLayerGroup.clearLayers();
      const latestByRuas = {};
      lalinList.forEach(l=>{
        const ruasId = l.segmen_jalan?.ruas_jalan?.id;
        if(!ruasId) return;
        const cur = latestByRuas[ruasId];
        if(!cur || Number(l.tahun) > Number(cur.tahun)) latestByRuas[ruasId] = l;
      });
      const maxLhr = Math.max(1, ...Object.values(latestByRuas).map(l=>Number(l.lhr)||0));
      Object.entries(latestByRuas).forEach(([ruasId, l])=>{
        try{
          const line = ruasLineCoords(ruasId);
          if(!line) return;
          const pt = pointAlongLine(line.coords, 0.5);
          if(!pt) return;
          const ratio = Math.min(1, (Number(l.lhr)||0)/maxLhr);
          const color = ratio>=0.66 ? '#C43D3D' : ratio>=0.33 ? '#E0672B' : '#2E8B57';
          const marker = L.circleMarker(pt, {radius: 6+ratio*10, color, fillColor:color, fillOpacity:.55, weight:2});
          marker.bindPopup(`<b>${line.r.kode_ruas}</b> — ${line.r.nama_ruas}<br>LHR ${l.tahun}: <b>${fmtNum(l.lhr,0)}</b> smp/hari${l.sumber_data?`<br>Sumber: ${l.sumber_data}`:''}`);
          marker.addTo(lalinLayerGroup);
        }catch(e){ console.warn('Peta: lewati data LHR pada ruas ->', ruasId, e); }
      });
    }

    function drawSafe(){
      try{ draw(); }catch(e){ console.error('Peta: draw() gagal total ->', e); }
      try{ drawJembatan(); }catch(e){ console.error('Peta: drawJembatan() gagal ->', e); }
      try{ drawBencana(); }catch(e){ console.error('Peta: drawBencana() gagal ->', e); }
      try{ drawLalin(); }catch(e){ console.error('Peta: drawLalin() gagal ->', e); }
    }

    drawSafe();
    document.getElementById('map-loading')?.remove();

    document.getElementById('peta-mode-toggle').addEventListener('click', (e)=>{
      const btn = e.target.closest('button[data-mode]');
      if(!btn) return;
      mode = btn.dataset.mode;
      document.querySelectorAll('#peta-mode-toggle button').forEach(b=>{
        b.classList.toggle('bg-accent-dark', b===btn);
        b.classList.toggle('text-white', b===btn);
        b.classList.toggle('bg-white', b!==btn);
        b.classList.toggle('text-ink-600', b!==btn);
      });
      document.getElementById('peta-subtitle').textContent = mode==='kondisi'
        ? 'Sebaran ruas jalan, diwarnai berdasarkan kondisi terkini'
        : 'Sebaran ruas jalan, diwarnai berdasarkan skor prioritas penanganan (kondisi + LHR + bencana)';
      document.getElementById('peta-legend').innerHTML = mode==='kondisi' ? LEGEND_KONDISI : LEGEND_PRIORITAS;
      drawSafe();
    });

    document.getElementById('peta-toggle-jembatan').addEventListener('change', (e)=>{
      if(e.target.checked){ jembatanLayerGroup.addTo(map); document.getElementById('peta-legend-jembatan').classList.remove('hidden'); }
      else { map.removeLayer(jembatanLayerGroup); document.getElementById('peta-legend-jembatan').classList.add('hidden'); }
    });
    document.getElementById('peta-toggle-bencana').addEventListener('change', (e)=>{
      if(e.target.checked){ bencanaLayerGroup.addTo(map); document.getElementById('peta-legend-bencana').classList.remove('hidden'); document.getElementById('peta-legend-bencana').classList.add('flex'); }
      else { map.removeLayer(bencanaLayerGroup); document.getElementById('peta-legend-bencana').classList.add('hidden'); document.getElementById('peta-legend-bencana').classList.remove('flex'); }
    });
    document.getElementById('peta-toggle-lalin').addEventListener('change', (e)=>{
      if(e.target.checked){ lalinLayerGroup.addTo(map); document.getElementById('peta-legend-lalin').classList.remove('hidden'); document.getElementById('peta-legend-lalin').classList.add('flex'); }
      else { map.removeLayer(lalinLayerGroup); document.getElementById('peta-legend-lalin').classList.add('hidden'); document.getElementById('peta-legend-lalin').classList.remove('flex'); }
    });
  }catch(err){ document.getElementById('map-loading')?.remove(); v.insertAdjacentHTML('beforeend', errorPanel(err)); }
}

      <div class="text-[13px] text-ink-600">Export gabungan ruas + kegiatan penanganan + anggaran untuk <span id="ruas-kab-export-nama" class="font-semibold text-ink-800"></span></div>
      <div id="ruas-kab-export-btns"></div>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr>
        <th data-col="kode_ruas" data-sort-key="kode_ruas">Kode</th><th data-col="nama_ruas" data-sort-key="nama_ruas">Nama Ruas</th><th data-col="kabupaten" data-sort-key="kabupaten">Kab/Kota</th>
        <th data-col="status_jalan" data-sort-key="status_jalan">Status</th><th data-col="fungsi_jalan" data-sort-key="fungsi_jalan">Fungsi</th><th data-col="panjang_km" data-sort-key="panjang_km">Panjang</th>

      </tr></thead>

      });

      const totalRows = rows.length;

          <td data-col="status_jalan" class="capitalize text-ink-500">${r.status_jalan||'—'}</td>
          <td data-col="fungsi_jalan" class="capitalize text-ink-500">${r.fungsi_jalan||'—'}</td>
          <td data-col="panjang_km" class="font-mono">${fmtNum(r.panjang_km,1)} km</td>
          <td data-col="lebar_jalan_m" class="font-mono">${r.lebar_jalan_m!=null? fmtNum(r.lebar_jalan_m,1)+' m' : '—'}</td>

              ${(r.lat_akhir!=null && r.long_akhir!=null)? `<a href="https://www.google.com/maps?q=${r.lat_akhir},${r.long_akhir}" target="_blank" title="Titik Akhir: ${fmtNum(r.lat_akhir,6)}, ${fmtNum(r.long_akhir,6)}" class="text-rose-600 hover:text-rose-700" onclick="event.stopPropagation()">${icon('flag','w-4 h-4')}</a>${copyBtn(`${r.lat_akhir},${r.long_akhir}`,'Salin koordinat titik akhir')}` : ''}

        </tr>`;}).join('');
      document.getElementById('ruas-empty').classList.toggle('hidden', totalRows>0);
      renderLoadMoreBtn(document.getElementById('ruas-loadmore'), totalRows, pageState, renderRows);
      terapkanKolomRuas(document.getElementById('ruas-tbody').closest('table'));
      tbody.querySelectorAll('tr').forEach(tr=>{
        tr.addEventListener('click', ()=>{ state.selectedRuasId = tr.dataset.id; renderShell(); });
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>{
          const r = ruas.find(x=>x.id===tr.dataset.id); openRuasFormModal(kabupaten, r);
        });
        tr.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
          const r = ruas.find(x=>x.id===tr.dataset.id);
          if(!(await confirmDelete(`Hapus ruas "${r.nama_ruas}" beserta seluruh data terkait (segmen, survei, penanganan)?`))) return;
          try{ await api.deleteRuas(r.id); viewRuas(); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
        });
      });
    }
    function renderRowsResetPage(){ pageState.shown = pageState.step; renderRows(); }
    document.getElementById('f-search').addEventListener('input', debounce(renderRowsResetPage, 300));
    ['f-kabupaten','f-status','f-fungsi','f-kondisi'].forEach(id=>document.getElementById(id).addEventListener('input', renderRowsResetPage));
    document.getElementById('f-kabupaten').addEventListener('input', toggleKabExportBox);
    document.getElementById('f-reset').addEventListener('click', ()=>{
      document.getElementById('f-search').value='';
      ['f-kabupaten','f-status','f-fungsi','f-kondisi'].forEach(id=>document.getElementById(id).value='');
      toggleKabExportBox();
      renderRowsResetPage();
    });
    document.getElementById('ruas-tbody').closest('table').querySelectorAll('thead th[data-sort-key]').forEach(th=>{
      wireSortableHeader(th, sortState, renderRows);
    });
    toggleKabExportBox();
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-ruas').addEventListener('click', ()=>openRuasFormModal(kabupaten)); }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

            ${segmen.map(s=>`<tr><td class="font-mono">${s.kode_segmen||'—'}</td><td class="font-mono">${fmtNum(s.sta_awal,3)} – ${fmtNum(s.sta_akhir,3)}</td><td class="capitalize">${s.jenis_perkerasan||'—'}</td><td>${s.jumlah_lajur||'—'}</td></tr>`).join('')}

              <div>
                <div class="font-semibold text-[13.5px] capitalize">${(b.jenis_kejadian||'—').replaceAll('_',' ')} <span class="text-ink-400 font-normal">· ${fmtDate(b.tanggal_kejadian)}</span></div>
                <div class="text-[12.5px] text-ink-500 mt-0.5">${b.kode_segmen? b.kode_segmen+' · STA '+fmtNum(b.sta_awal,3)+'–'+fmtNum(b.sta_akhir,3) : 'Langsung ke ruas (tanpa segmen)'}</div>

            ${ruas.lat_akhir&&ruas.long_akhir? `<div class="flex items-center justify-between"><div><span class="text-ink-400">Titik Akhir</span><div class="font-mono flex items-center gap-1.5">${fmtNum(ruas.lat_akhir,6)}, ${fmtNum(ruas.long_akhir,6)}${copyBtn(`${ruas.lat_akhir},${ruas.long_akhir}`,'Salin koordinat titik akhir')}</div></div><a href="https://www.google.com/maps?q=${ruas.lat_akhir},${ruas.long_akhir}" target="_blank" class="text-navy-700 text-[12px] underline shrink-0">Buka Peta</a></div>`:''}

        </div>`:''}

    document.getElementById('back-ruas').addEventListener('click', ()=>{ state.selectedRuasId=null; renderShell(); });
    document.getElementById('btn-export-laporan-ruas').addEventListener('click', ()=>exportLaporanRuasPdf(ruas, segmen, kegiatan, survei, anggaran, bencana));
    document.getElementById('btn-cetak-ruas').addEventListener('click', ()=>cetakHalaman());
    hydrateFotoThumbs(document.getElementById('kegiatan-list'));
    hydrateFotoThumbs(document.getElementById('survei-list'));
    if(isEditor()){

      document.getElementById('btn-add-anggaran')?.addEventListener('click', ()=>openAnggaranFormModal(ruas, null, ()=>viewRuasDetail(id)));

      document.getElementById('btn-add-lalin-ruas')?.addEventListener('click', ()=>openLalulintasRuasFormModal(ruas, segmen, null, ()=>viewRuasDetail(id)));
      document.getElementById('btn-add-lalin-ruas-2')?.addEventListener('click', ()=>openLalulintasRuasFormModal(ruas, segmen, null, ()=>viewRuasDetail(id)));

      row.querySelector('[data-act="detail"]')?.addEventListener('click', ()=>openKegiatanDetailModal(kg));
      row.querySelector('[data-act="edit"]')?.addEventListener('click', async ()=>{
        try{ const full = await api.penangananById(kg.id); openKegiatanFormModal(ruasAll, ruas, {...kg, ...full}, ()=>viewRuasDetail(id)); }
        catch(err){ alert('Gagal memuat data kegiatan: '+terjemahkanErrorDb(err)); }
      });
      row.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
        if(!(await confirmDelete('Hapus kegiatan penanganan ini beserta kelengkapan dokumennya?'))) return;
        try{ await api.deletePenanganan(kg.id); viewRuasDetail(id); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      });
    });
    // Survei kondisi actions
    document.querySelectorAll('#survei-list [data-sid]').forEach(row=>{
      const sv = survei.find(s=>s.id===row.dataset.sid);
      row.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openSurveiFormModal(ruas, segmen, sv, ()=>viewRuasDetail(id)));
      row.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
        if(!(await confirmDelete('Hapus catatan survei kondisi ini?'))) return;
        try{ await api.deleteSurvei(sv.id); viewRuasDetail(id); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      });
    });
    // Data lalu lintas actions (panel ruas)
    document.querySelectorAll('#lalin-ruas-list [data-lid]').forEach(row=>{
      const l = lalulintas.find(x=>x.id===row.dataset.lid);
      row.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openLalulintasRuasFormModal(ruas, segmen, l, ()=>viewRuasDetail(id)));
      row.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
        if(!(await confirmDelete('Hapus data lalu lintas ini?'))) return;
        try{ await api.deleteLalulintas(l.id); viewRuasDetail(id); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      });
    });
    // Kejadian bencana actions (panel ruas)
    document.querySelectorAll('#bencana-ruas-list [data-bid]').forEach(row=>{
      const b = bencana.find(x=>x.id===row.dataset.bid);
      row.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openBencanaFormModal(ruasAll, b, ()=>viewRuasDetail(id), ruas.id));
      row.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
        if(!(await confirmDelete('Hapus catatan kejadian bencana ini?'))) return;
        try{ await api.deleteBencana(b.id); viewRuasDetail(id); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      });
    });
    // Anggaran actions
    document.querySelectorAll('#anggaran-list [data-aid]').forEach(row=>{
      const ag = anggaran.find(a=>a.id===row.dataset.aid);
      row.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openAnggaranFormModal(ruas, ag, ()=>viewRuasDetail(id)));
      row.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
        if(!(await confirmDelete('Hapus data anggaran tahun ini?'))) return;
        try{ await api.deleteAnggaran(ag.id); viewRuasDetail(id); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      });
    });
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 11. MODAL: TAMBAH RUAS -------------------------------------------
function openModal(innerHtml){
  const overlay = el(`<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4"></div>`);
  overlay.innerHTML = `<div class="card w-full max-w-lg max-h-[88vh] overflow-y-auto p-6 relative">${innerHtml}</div>`;
  // Pengembangan #7: modal bisa memasang overlay._confirmBeforeClose = ()=>boolean
  // untuk menahan penutupan modal (mis. form panjang yang ada isian belum disimpan).
  overlay.closeModal = ()=>{
    if(overlay._confirmBeforeClose && !overlay._confirmBeforeClose()) return;
    overlay.remove();
  };
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.closeModal(); });
  document.body.appendChild(overlay);
  return overlay;
}

      <div><label class="text-[12.5px] font-semibold text-ink-600">Nama Ruas *</label><input id="rj-nama" required placeholder="mis. Kupang – Oesao" value="${editData?.nama_ruas||''}"></div>

function openSurveiFormModal(ruas, segmenList, editData=null, onSaved=null){
  const isEdit = !!editData;
  const currentSegId = editData?.segmen_id || editData?.segmen_jalan?.id;
  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>
    <h3 class="font-display font-extrabold text-lg mb-1">${isEdit?'Ubah Survei Kondisi':'Input Survei Kondisi'}</h3>
    <p class="text-[13px] text-ink-500 mb-4">${ruas.kode_ruas} · ${ruas.nama_ruas}</p>
    <form id="form-survei" class="space-y-3">
      <div><label class="text-[12.5px] font-semibold text-ink-600">Segmen *</label>
        <select id="sv-segmen" required>${segmenList.length? segmenList.map(s=>`<option value="${s.id}" ${currentSegId===s.id?'selected':''}>${s.kode_segmen||'Segmen'} (STA ${fmtNum(s.sta_awal,3)}–${fmtNum(s.sta_akhir,3)})</option>`).join('') : `<option value="">Belum ada segmen</option>`}</select></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[12.5px] font-semibold text-ink-600">Tanggal Survei *</label><input id="sv-tanggal" type="date" required value="${editData?.tanggal_survei||''}"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Kondisi *</label><select id="sv-kondisi" required>${KONDISI_ORDER.map(k=>`<option value="${k}" ${editData?.kondisi===k?'selected':''}>${KONDISI_LABEL[k]}</option>`).join('')}</select></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[12.5px] font-semibold text-ink-600">Nilai IRI</label><input id="sv-iri" type="number" step="0.01" min="0" value="${editData?.nilai_iri??''}"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Metode Survei</label><select id="sv-metode">
          <option value="visual" ${!editData||editData?.metode_survei==='visual'?'selected':''}>Visual</option>
          <option value="alat_ukur" ${editData?.metode_survei==='alat_ukur'?'selected':''}>Alat Ukur</option>
          <option value="drone" ${editData?.metode_survei==='drone'?'selected':''}>Drone</option>
          <option value="lainnya">Lainnya (isi manual)</option>
        </select><input id="sv-metode-lainnya" class="hidden mt-2" placeholder="Tuliskan metode survei…"></div>
      </div>
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Surveyor</label>
        <p class="text-[11.5px] text-ink-400 mt-0.5 mb-1.5">Nama petugas yang mensurvei. Kalau disurvei sebagai tim, tuliskan semua nama dipisah koma (mis. "Budi, Siti, Ahmad").</p>
        <input id="sv-surveyor" placeholder="mis. Budi, Siti, Ahmad" value="${editData?.surveyor||''}">
      </div>
      <div id="sv-duplikat-warn" class="hidden text-[12.5px] bg-[#FCF1DF] text-[#8A5A0E] rounded-lg px-3 py-2"></div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Catatan</label><textarea id="sv-catatan" rows="2">${editData?.catatan||''}</textarea></div>
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Link Dokumentasi</label>
        <p class="text-[11.5px] text-ink-400 mt-0.5 mb-1.5">Opsional. Tempel link folder foto/video (mis. Google Drive/Photos) di sini agar tidak perlu unggah banyak foto satu per satu ke aplikasi.</p>
        <input id="sv-link" type="url" placeholder="https://…" value="${editData?.link_dokumentasi||''}">
      </div>
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Foto Kondisi</label>
        <p class="text-[11.5px] text-ink-400 mt-0.5 mb-1.5">Bisa pilih lebih dari satu foto sekaligus, atau tambahkan bertahap. Untuk foto dalam jumlah banyak, lebih disarankan pakai Link Dokumentasi di atas. Foto akan dikompres otomatis sebelum diunggah agar hemat kuota.</p>
        <div id="sv-foto-existing" class="flex flex-wrap gap-2 mb-1.5"></div>
        <div id="sv-foto-new" class="flex flex-wrap gap-2 mb-1.5"></div>
        <input id="sv-foto" type="file" accept="image/*" multiple class="!py-1.5 text-[12px] w-full">
        ${progresUploadHtml('sv-progress')}
      </div>
      <div id="sv-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full" ${segmenList.length?'':'disabled'}>${isEdit?'Simpan Perubahan':'Simpan Survei'}</button>
    </form>`);

  // Usulan #8: peringatan "perubahan belum disimpan" saat form ditutup, sama
  // seperti mekanisme yang sudah dipasang di form Kegiatan Penanganan.
  let svDirty = false;
  let svSubmitted = false;
  const svForm = overlay.querySelector('#form-survei');
  svForm.addEventListener('input', ()=>{ svDirty = true; });
  svForm.addEventListener('change', ()=>{ svDirty = true; });
  overlay._confirmBeforeClose = ()=>{
    if(svSubmitted || !svDirty) return true;
    return confirm('Anda yakin ingin menutup? Perubahan belum disimpan.');
  };
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.closeModal());
  const getMetodeSurvei = wireLainnyaOption(overlay.querySelector('#sv-metode'), overlay.querySelector('#sv-metode-lainnya'), {known:['visual','alat_ukur','drone'], current: editData?.metode_survei});
  const existingFotoPaths = editData?.foto_paths?.length ? editData.foto_paths : (editData?.foto_path ? [editData.foto_path] : []);
  const fotoPicker = wireMultiPhotoPicker(overlay.querySelector('#sv-foto'), overlay.querySelector('#sv-foto-existing'), overlay.querySelector('#sv-foto-new'), existingFotoPaths);
  hydrateFotoThumbs(overlay);

  // Opsi A: peringatan non-blocking kalau segmen ini sudah pernah disurvei pada tanggal yang sama.
  // Tidak memblokir simpan — bisa jadi memang survei tim/kedua yang sah pada hari yang sama.
  const dupWarnBox = overlay.querySelector('#sv-duplikat-warn');
  async function cekDuplikatSurvei(){
    const segId = overlay.querySelector('#sv-segmen').value;
    const tgl = overlay.querySelector('#sv-tanggal').value;
    if(!segId || !tgl){ dupWarnBox.classList.add('hidden'); return; }
    try{
      const existing = await api.surveiCekDuplikat(segId, tgl, editData?.id||null);
      if(existing.length){
        const daftar = existing.map(x=>`${x.surveyor||'surveyor tidak diisi'} (${KONDISI_LABEL[x.kondisi]||x.kondisi})`).join('; ');
        dupWarnBox.textContent = `⚠ Sudah ada survei untuk segmen ini pada tanggal yang sama, oleh ${daftar}. Anda tetap bisa lanjutkan simpan kalau ini memang survei tim/kedua yang sah.`;
        dupWarnBox.classList.remove('hidden');
      } else {
        dupWarnBox.classList.add('hidden');
      }
    }catch(e){ /* cek ini murni informasional, jangan ganggu alur kalau gagal */ }
  }
  overlay.querySelector('#sv-segmen').addEventListener('change', cekDuplikatSurvei);
  overlay.querySelector('#sv-tanggal').addEventListener('change', cekDuplikatSurvei);
  cekDuplikatSurvei();

  overlay.querySelector('#form-survei').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#sv-err');
    errBox.classList.add('hidden');
    const submitBtn = overlay.querySelector('button[type="submit"]');
    const newFiles = fotoPicker.getNewFiles();
    submitBtn.disabled = true; const submitLabel = submitBtn.textContent;
    try{
      let uploadedPaths = [];
      if(newFiles.length){
        submitBtn.textContent = `Mengunggah ${newFiles.length} foto…`;
        const items = newFiles.map(f=>({ruasId: ruas.id, file:f, label:'kondisi'}));
        uploadedPaths = await uploadFotoBanyakDenganProgres(items, 'survei', (p)=>setProgresUpload(overlay, 'sv-progress', p));
        hideProgresUpload(overlay, 'sv-progress');
      }
      const fotoPaths = [...fotoPicker.getKeptPaths(), ...uploadedPaths];
      submitBtn.textContent = submitLabel;
      const payload = {
        segmen_id: overlay.querySelector('#sv-segmen').value,
        tanggal_survei: overlay.querySelector('#sv-tanggal').value,
        kondisi: overlay.querySelector('#sv-kondisi').value,
        nilai_iri: overlay.querySelector('#sv-iri').value || null,
        metode_survei: getMetodeSurvei(),
        surveyor: overlay.querySelector('#sv-surveyor').value || null,
        catatan: overlay.querySelector('#sv-catatan').value || null,
        link_dokumentasi: overlay.querySelector('#sv-link').value || null,
        foto_paths: fotoPaths,
        foto_path: fotoPaths[0] || null,
      };
      if(isEdit){ await api.updateSurvei(editData.id, payload); }
      else{
        payload.created_by = state.user.id;
        try{ await api.insertSurvei(payload); }
        catch(insErr){
          if(!newFiles.length && isKemungkinanErrorJaringan(insErr)){
            tambahAntreanOffline(payload);
            svSubmitted = true;
            overlay.remove();
            notifikasiToast('Tidak ada koneksi. Data survei disimpan di perangkat & akan otomatis terkirim saat online kembali.');
            if(onSaved) onSaved(); else viewRuasDetail(ruas.id);
            return;
          }
          throw insErr;
        }
      }
      svSubmitted = true;
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved(); else viewRuasDetail(ruas.id);
    }catch(err){
      submitBtn.textContent = submitLabel;
      errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
    }
  });
}

      <div id="kg-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Kegiatan Penanganan'}</button>
    </form>`);

  // Pengembangan #7: peringatan "perubahan belum disimpan" saat form ditutup.
  // Form ini cukup panjang, jadi tanda perubahan (dirty) dipantau begitu ada
  // input/pilihan yang diubah oleh pengguna, dan modal minta konfirmasi
  // sebelum ditutup lewat tombol ✕ atau klik di luar modal.
  let kgDirty = false;
  let kgSubmitted = false;
  const kgForm = overlay.querySelector('#form-kegiatan');
  kgForm.addEventListener('input', ()=>{ kgDirty = true; });
  kgForm.addEventListener('change', ()=>{ kgDirty = true; });
  overlay._confirmBeforeClose = ()=>{
    if(kgSubmitted || !kgDirty) return true;
    return confirm('Anda yakin ingin menutup? Perubahan belum disimpan.');
  };
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.closeModal());

  // Pengembangan #6: validasi tanggal langsung saat diisi (bukan cuma saat submit).
  const kgTglMulaiEl = overlay.querySelector('#kg-tgl-mulai');
  const kgTglSelesaiEl = overlay.querySelector('#kg-tgl-selesai');
  function validasiTanggalLive(){
    const errBox = overlay.querySelector('#kg-err');
    if(kgTglMulaiEl.value && kgTglSelesaiEl.value && kgTglSelesaiEl.value < kgTglMulaiEl.value){
      kgTglSelesaiEl.style.borderColor = 'var(--bad)';
      errBox.textContent = 'Tanggal Selesai tidak boleh lebih awal dari Tanggal Mulai.';
      errBox.classList.remove('hidden');
    } else {
      kgTglSelesaiEl.style.borderColor = '';
      errBox.classList.add('hidden');
    }
  }
  kgTglMulaiEl.addEventListener('change', validasiTanggalLive);
  kgTglSelesaiEl.addEventListener('change', validasiTanggalLive);

  let getSubKegiatan = ()=>overlay.querySelector('#kg-sub').value;
  async function loadSubKegiatan(jenis, selected){
    const sel = overlay.querySelector('#kg-sub');
    const inp = overlay.querySelector('#kg-sub-lainnya');
    sel.innerHTML = `<option value="">Memuat…</option>`;
    try{
      const list = await api.subKegiatanRef(jenis);
      sel.innerHTML = `<option value="">— Pilih sub kegiatan —</option>` +
        list.map(s=>`<option value="${s.nama_sub_kegiatan}">${s.nama_sub_kegiatan}</option>`).join('') +
        `<option value="__custom__">Lainnya (isi manual)</option>`;
      getSubKegiatan = wireLainnyaOption(sel, inp, {sentinel:'__custom__', known:list.map(s=>s.nama_sub_kegiatan), current: selected});
    }catch(e){ sel.innerHTML = `<option value="">Gagal memuat sub kegiatan</option>`; getSubKegiatan = ()=>''; }
  }
  overlay.querySelector('#kg-jenis').addEventListener('change', (e)=>{ loadSubKegiatan(e.target.value, null); toggleBencanaField(); });
  loadSubKegiatan(overlay.querySelector('#kg-jenis').value, editData?.sub_kegiatan);

  async function loadBencanaOptions(ruasId, selectedId){
    const sel = overlay.querySelector('#kg-bencana');
    if(!ruasId){ sel.innerHTML = `<option value="">— Tidak terkait kejadian tertentu —</option>`; return; }
    sel.innerHTML = `<option value="">Memuat…</option>`;
    try{
      const list = await api.bencanaByRuas(ruasId);
      sel.innerHTML = `<option value="">— Tidak terkait kejadian tertentu —</option>` +
        list.map(b=>`<option value="${b.id}" ${selectedId===b.id?'selected':''}>${(b.jenis_kejadian||'—').replace('_',' ')} · ${fmtDate(b.tanggal_kejadian)}${b.kode_segmen?' · '+b.kode_segmen:''}</option>`).join('');
    }catch(e){ sel.innerHTML = `<option value="">Gagal memuat data kejadian bencana</option>`; }
  }
  function toggleBencanaField(){
    const wrap = overlay.querySelector('#kg-bencana-wrap');
    const isDarurat = overlay.querySelector('#kg-jenis').value === 'tanggap_darurat';
    wrap.classList.toggle('hidden', !isDarurat);
    if(isDarurat){ loadBencanaOptions(overlay.querySelector('#kg-ruas').value, editData?.kejadian_bencana_id); }
  }
  overlay.querySelector('#kg-ruas').addEventListener('change', (e)=>{
    if(overlay.querySelector('#kg-jenis').value === 'tanggap_darurat'){ loadBencanaOptions(e.target.value, null); }
  });
  toggleBencanaField();

  wirePhotoPreview(overlay.querySelector('#kg-foto-awal'), overlay.querySelector('#kg-foto-awal-preview'), overlay.querySelector('#kg-foto-awal-ph'));
  wirePhotoPreview(overlay.querySelector('#kg-foto-akhir'), overlay.querySelector('#kg-foto-akhir-preview'), overlay.querySelector('#kg-foto-akhir-ph'));
  hydrateFotoThumbs(overlay);

  const getSumberDana = wireLainnyaOption(overlay.querySelector('#kg-sumber'), overlay.querySelector('#kg-sumber-lainnya'), {sentinel:'Lainnya', known:['APBD_Provinsi','APBN','DAK','Hibah'], current: editData?.sumber_dana});
  overlay.querySelector('#form-kegiatan').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#kg-err');
    errBox.classList.add('hidden');
    const submitBtn = overlay.querySelector('button[type="submit"]');
    const subKegiatan = getSubKegiatan();
    const tglMulai = overlay.querySelector('#kg-tgl-mulai').value;
    const tglSelesai = overlay.querySelector('#kg-tgl-selesai').value;
    const ruasId = overlay.querySelector('#kg-ruas').value;
    const fileAwal = overlay.querySelector('#kg-foto-awal').files?.[0] || null;
    const fileAkhir = overlay.querySelector('#kg-foto-akhir').files?.[0] || null;
    // Pengembangan #6: validasi tanggal langsung di form, sebelum submit ke database.
    if(tglMulai && tglSelesai && tglSelesai < tglMulai){
      errBox.textContent = 'Tanggal Selesai tidak boleh lebih awal dari Tanggal Mulai.';
      errBox.classList.remove('hidden');
      overlay.querySelector('#kg-tgl-selesai').focus();
      return;
    }
    submitBtn.disabled = true; const submitLabel = submitBtn.textContent;
    try{
      let fotoAwalPath = editData?.foto_awal_path || null;
      let fotoAkhirPath = editData?.foto_akhir_path || null;
      const fotoItems = [];
      if(fileAwal) fotoItems.push({key:'awal', ruasId, file:fileAwal, label:'awal'});
      if(fileAkhir) fotoItems.push({key:'akhir', ruasId, file:fileAkhir, label:'akhir'});
      if(fotoItems.length){
        submitBtn.textContent = `Mengunggah ${fotoItems.length} foto…`;
        const uploaded = await uploadFotoBanyakDenganProgres(fotoItems, 'penanganan', (p)=>setProgresUpload(overlay, 'kg-progress', p));
        fotoItems.forEach((it,i)=>{ if(it.key==='awal') fotoAwalPath = uploaded[i]; else fotoAkhirPath = uploaded[i]; });
        hideProgresUpload(overlay, 'kg-progress');
      }
      submitBtn.textContent = submitLabel;
      const payload = {
        ruas_id: ruasId,
        jenis_penanganan: overlay.querySelector('#kg-jenis').value,
        kategori_ruang: overlay.querySelector('#kg-kategori').value || null,
        sub_kegiatan: subKegiatan || null,
        sta_awal: overlay.querySelector('#kg-sta-awal').value || null,
        sta_akhir: overlay.querySelector('#kg-sta-akhir').value || null,
        foto_awal_path: fotoAwalPath,
        foto_akhir_path: fotoAkhirPath,
        tanggal_mulai: tglMulai || null,
        tanggal_selesai: overlay.querySelector('#kg-tgl-selesai').value || null,
        tahun_anggaran: tglMulai ? new Date(tglMulai).getFullYear() : new Date().getFullYear(),
        status_pekerjaan: overlay.querySelector('#kg-status').value,
        sumber_dana: getSumberDana() || null,
        nilai_pci: overlay.querySelector('#kg-pci').value || null,
        nilai_sdi: overlay.querySelector('#kg-sdi').value || null,
        nilai_ikp: overlay.querySelector('#kg-ikp').value || null,
        kondisi_hasil: overlay.querySelector('#kg-kondisi-hasil').value || null,
        rekomendasi: overlay.querySelector('#kg-rekomendasi').value || null,
        volume: overlay.querySelector('#kg-volume').value || null,
        satuan: overlay.querySelector('#kg-satuan').value || null,
        biaya: overlay.querySelector('#kg-biaya').value || null,
        kontraktor_pelaksana: overlay.querySelector('#kg-kontraktor').value || null,
        link_dokumentasi: overlay.querySelector('#kg-link').value || null,
        deskripsi: overlay.querySelector('#kg-deskripsi').value || null,
        kejadian_bencana_id: overlay.querySelector('#kg-jenis').value === 'tanggap_darurat' ? (overlay.querySelector('#kg-bencana').value || null) : null,
      };
      if(isEdit){ payload.segmen_id = editData?.segmen_id ?? null; }
      if(isEdit){ await api.updatePenanganan(editData.id, payload, editData?.updated_at || null); }
      else{ payload.created_by = state.user.id; await api.insertPenanganan(payload); }
      kgSubmitted = true;
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved(); else viewKegiatan();
    }catch(err){
      submitBtn.textContent = submitLabel; submitBtn.disabled = false;
      if(err.code === 'STALE_UPDATE'){
        errBox.innerHTML = `${terjemahkanErrorDb(err)} <button type="button" id="kg-err-reload" class="underline font-semibold ml-1">Muat ulang</button>`;
        errBox.classList.remove('hidden');
        errBox.querySelector('#kg-err-reload')?.addEventListener('click', async ()=>{
          try{
            const fresh = await api.penangananById(editData.id);
            kgSubmitted = true;
            overlay.remove();
            openKegiatanFormModal(ruasList, defaultRuas, {...editData, ...fresh}, onSaved);
          }catch(e){ /* biarkan modal lama terbuka kalau gagal memuat ulang */ }
        });
      } else {
        errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden');
      }
    }
  });
}

    ${kg.rekomendasi?`<div class="mb-3 text-[13px]"><span class="text-ink-400">Rekomendasi</span><p class="text-ink-600 mt-0.5">${kg.rekomendasi}</p></div>`:''}

    ${(kg.foto_awal_path||kg.foto_akhir_path)? `<div class="mb-4">
      <span class="text-[13px] text-ink-400">Foto Dokumentasi</span>

        ${kg.foto_awal_path? `<div><div class="text-[11.5px] text-ink-400 mb-1">STA Awal</div>${fotoThumbHtml(kg.foto_awal_path,'w-full h-32')}</div>`:''}
        ${kg.foto_akhir_path? `<div><div class="text-[11.5px] text-ink-400 mb-1">STA Akhir</div>${fotoThumbHtml(kg.foto_akhir_path,'w-full h-32')}</div>`:''}
      </div>
    </div>`:''}
    ${kg.link_dokumentasi?`<div class="mb-4 text-[13px]"><span class="text-ink-400">Link Dokumentasi</span><div class="mt-0.5"><a href="${kg.link_dokumentasi}" target="_blank" class="text-navy-700 underline break-all">${kg.link_dokumentasi}</a></div></div>`:''}

    if(!rows.length){ box.innerHTML = `<p class="text-ink-400">Belum ada daftar dokumen (kemungkinan trigger otomatis belum berjalan).</p>`; return; }
    const byTahap = {};
    rows.forEach(r=>{ (byTahap[r.tahap_nama] ??= []).push(r); });

          </div>`).join('')}
      </div>`).join('');
    if(isEditor()){
      box.querySelectorAll('[data-dokid]').forEach(row=>{
        const dokId = row.dataset.dokid;
        const rowData = rows.find(r=>r.dokumen_id===dokId);
        row.querySelector('[data-toggle]').addEventListener('click', async (e)=>{
          const newStatus = rowData.status==='sudah' ? 'belum' : 'sudah';
          try{
            await api.updateDokumen(dokId, {status:newStatus, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id});
            rowData.status = newStatus;
            e.currentTarget.className = `w-5 h-5 rounded border ${newStatus==='sudah'?'bg-[var(--good)] border-[var(--good)] text-white':'border-line'} flex items-center justify-center shrink-0`;
            e.currentTarget.innerHTML = newStatus==='sudah'?icon('check','w-3.5 h-3.5'):'';
          }catch(err){ alert('Gagal memperbarui status dokumen: '+terjemahkanErrorDb(err)); }
        });
        row.querySelector('[data-link]').addEventListener('change', async (e)=>{
          try{ await api.updateDokumen(dokId, {link_dokumen: e.target.value || null, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id}); }
          catch(err){ alert('Gagal menyimpan link: '+terjemahkanErrorDb(err)); }
        });
      });
    }
  }).catch(err=>{ overlay.querySelector('#dok-matrix').innerHTML = errorPanel(err); });
}

        <div><label class="text-[12.5px] font-semibold text-ink-600">Sumber Dana</label><select id="ag-sumber"><option value="">—</option>${SUMBER_DANA_OPT.map(([v,l])=>`<option value="${v}" ${editData?.sumber_dana===v?'selected':''}>${l}</option>`).join('')}</select><input id="ag-sumber-lainnya" class="hidden mt-2" placeholder="Tuliskan sumber dana…"></div>

        <div><label class="text-[12.5px] font-semibold text-ink-600">Realisasi (Rp)</label><input id="ag-realisasi" type="number" step="1" min="0" value="${editData?.realisasi??0}"></div>
      </div>
      <div id="ag-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Anggaran'}</button>
    </form>`);

  // Usulan #8: peringatan "perubahan belum disimpan" saat form ditutup, sama
  // seperti mekanisme yang sudah dipasang di form Kegiatan Penanganan.
  let agDirty = false;
  let agSubmitted = false;
  const agForm = overlay.querySelector('#form-anggaran');
  agForm.addEventListener('input', ()=>{ agDirty = true; });
  agForm.addEventListener('change', ()=>{ agDirty = true; });
  overlay._confirmBeforeClose = ()=>{
    if(agSubmitted || !agDirty) return true;
    return confirm('Anda yakin ingin menutup? Perubahan belum disimpan.');
  };
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.closeModal());
  const getSumberDanaAg = wireLainnyaOption(overlay.querySelector('#ag-sumber'), overlay.querySelector('#ag-sumber-lainnya'), {sentinel:'Lainnya', known:['APBD_Provinsi','APBN','DAK','Hibah'], current: editData?.sumber_dana});
  overlay.querySelector('#form-anggaran').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#ag-err');
    const payload = {
      ruas_id: ruas.id,
      tahun: overlay.querySelector('#ag-tahun').value,
      sumber_dana: getSumberDanaAg() || null,
      pagu: overlay.querySelector('#ag-pagu').value || 0,
      realisasi: overlay.querySelector('#ag-realisasi').value || 0,
    };
    try{
      if(isEdit){ await api.updateAnggaran(editData.id, payload); }
      else{ await api.insertAnggaran(payload); }
      agSubmitted = true;
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved(); else viewRuasDetail(ruas.id);
    }catch(err){ errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden'); }
  });
}

            <option value="banjir" ${editData?.jenis_kejadian==='banjir'?'selected':''}>Banjir</option>
            <option value="abrasi" ${editData?.jenis_kejadian==='abrasi'?'selected':''}>Abrasi</option>
            <option value="gempa" ${editData?.jenis_kejadian==='gempa'?'selected':''}>Gempa</option>
            <option value="angin_kencang" ${editData?.jenis_kejadian==='angin_kencang'?'selected':''}>Angin Kencang</option>
            <option value="lainnya">Lainnya (isi manual)</option>
          </select><input id="bc-jenis-lainnya" class="hidden mt-2" placeholder="Tuliskan jenis kejadian…"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Tanggal Kejadian *</label><input id="bc-tanggal" type="date" required value="${editData?.tanggal_kejadian||''}"></div>
      </div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Tingkat Kerusakan</label>
        <select id="bc-tingkat">
          <option value="">—</option>
          <option value="ringan" ${editData?.tingkat_kerusakan==='ringan'?'selected':''}>Ringan</option>
          <option value="sedang" ${editData?.tingkat_kerusakan==='sedang'?'selected':''}>Sedang</option>
          <option value="berat" ${editData?.tingkat_kerusakan==='berat'?'selected':''}>Berat</option>
          <option value="putus_total" ${editData?.tingkat_kerusakan==='putus_total'?'selected':''}>Putus Total</option>
        </select></div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Deskripsi</label><textarea id="bc-deskripsi" rows="3">${editData?.deskripsi||''}</textarea></div>
      <div id="bc-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Kejadian Bencana'}</button>
    </form>`);
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());

  async function loadSegmenOptions(ruasId, selectedSegId){
    const sel = overlay.querySelector('#bc-segmen');
    if(!ruasId){ sel.innerHTML = `<option value="">Pilih ruas terlebih dahulu…</option>`; return; }
    sel.innerHTML = `<option value="">Memuat…</option>`;
    try{
      const segs = await api.segmenByRuas(ruasId);
      const noneOpt = `<option value="">— Tanpa segmen (langsung ke ruas) —</option>`;
      sel.innerHTML = noneOpt + (segs.length? segs.map(s=>`<option value="${s.id}" ${selectedSegId===s.id?'selected':''}>${s.kode_segmen||'Segmen'} (STA ${fmtNum(s.sta_awal,3)}–${fmtNum(s.sta_akhir,3)})</option>`).join('') : '');
    }catch(e){ sel.innerHTML = `<option value="">Gagal memuat segmen</option>`; }
  }
  overlay.querySelector('#bc-ruas').addEventListener('change', (e)=>loadSegmenOptions(e.target.value, null));
  if(editData){
    const ruasId = editData.ruas_id || null;
    if(ruasId){ overlay.querySelector('#bc-ruas').value = ruasId; loadSegmenOptions(ruasId, editData.segmen_id); }
  } else if(presetRuasId){
    const ruasSel = overlay.querySelector('#bc-ruas');
    ruasSel.value = presetRuasId;
    ruasSel.disabled = true;
    loadSegmenOptions(presetRuasId, null);
  }

  const getJenisKejadian = wireLainnyaOption(overlay.querySelector('#bc-jenis'), overlay.querySelector('#bc-jenis-lainnya'), {known:['longsor','banjir','abrasi','gempa','angin_kencang'], current: editData?.jenis_kejadian});
  overlay.querySelector('#form-bencana').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#bc-err');
    const ruasId = overlay.querySelector('#bc-ruas').value;
    const payload = {
      ruas_id: ruasId || null,
      segmen_id: overlay.querySelector('#bc-segmen').value || null,
      jenis_kejadian: getJenisKejadian(),
      tanggal_kejadian: overlay.querySelector('#bc-tanggal').value,
      tingkat_kerusakan: overlay.querySelector('#bc-tingkat').value || null,
      deskripsi: overlay.querySelector('#bc-deskripsi').value || null,
    };
    if(!ruasId){ errBox.textContent = 'Pilih ruas terlebih dahulu.'; errBox.classList.remove('hidden'); return; }
    try{
      if(isEdit){ await api.updateBencana(editData.id, payload); }
      else{ payload.created_by = state.user.id; await api.insertBencana(payload); }
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved(); else viewBencana();
    }catch(err){ errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden'); }
  });
}

// --- 11e. VIEW: KEGIATAN PENANGANAN (menu baru) ----------------------------
async function viewKegiatan(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-10 w-full mb-4"></div>${skeletonTable(9)}`;
  try{
    const [kegiatan, ruas, kabupaten, dokKurangList] = await Promise.all([api.kegiatanList(), api.ruasList(), api.kabupaten(), api.kegiatanDokumenKurang().catch(()=>[])]);
    state.ruasCache = ruas;
    // Usulan #9: peta id kegiatan -> jumlah dokumen wajib yang masih kurang, dipakai untuk
    // menandai baris tabel Kegiatan Penanganan (bukan hanya di widget notifikasi dashboard).
    const dokKurangById = {};
    dokKurangList.forEach(d=>{ dokKurangById[d.penanganan_id] = d.jumlah_dokumen_kurang; });
    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Kegiatan Penanganan</h1>
      <p class="text-ink-500 text-[13.5px]"><span id="kegiatan-count">${kegiatan.length}</span> kegiatan tercatat, terhubung langsung ke master ruas jalan</p></div>
      <div class="flex items-center gap-2 flex-wrap">
        <div id="kegiatan-export"></div>
        ${isEditor()?`<button id="btn-add-kegiatan" class="btn-accent">+ Tambah Kegiatan Penanganan</button>`:''}
      </div>
    </div>
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="fk-search" placeholder="Cari ruas / sub kegiatan…" class="max-w-xs">
      <select id="fk-kabupaten" class="max-w-[200px]"><option value="">Semua Kabupaten/Kota</option>${kabupaten.map(k=>`<option value="${k.id}">${k.nama}</option>`).join('')}</select>
      <select id="fk-jenis" class="max-w-[200px]"><option value="">Semua Jenis</option>${JENIS_PENANGANAN_OPT.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
      <select id="fk-status" class="max-w-[180px]"><option value="">Semua Status</option>${STATUS_PEKERJAAN_OPT.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
      <select id="fk-sumber" class="max-w-[190px]"><option value="">Semua Sumber Dana</option>${SUMBER_DANA_OPT.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
      <div class="flex items-center gap-1.5 text-[12.5px] text-ink-500">
        <span>Mulai</span><input id="fk-tgl-dari" type="date" class="max-w-[150px]">
        <span>s/d</span><input id="fk-tgl-sampai" type="date" class="max-w-[150px]">
      </div>
      <button id="fk-reset" class="btn-ghost !py-1.5 !px-3 text-[12.5px]">Reset Filter</button>
      <div class="flex-1"></div>
      ${colPickerHtml('kegiatan')}
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr>
        <th data-col="foto">Foto</th><th data-col="ruas" data-sort-key="ruas">Ruas</th><th data-col="jenis_penanganan" data-sort-key="jenis_penanganan">Jenis</th><th data-col="sub_kegiatan" data-sort-key="sub_kegiatan">Sub Kegiatan</th>
        <th data-col="tanggal_penanganan" data-sort-key="tanggal_penanganan">Tgl. Mulai</th><th data-col="tanggal_selesai" data-sort-key="tanggal_selesai">Tgl. Selesai</th><th data-col="biaya" data-sort-key="biaya">Biaya</th>
        <th data-col="status_pekerjaan" data-sort-key="status_pekerjaan">Status</th><th data-col="link_dokumentasi">Link Dokumentasi</th>${isEditor()?'<th data-col="aksi" data-wajib>Aksi</th>':''}
      </tr></thead>
      <tbody id="kegiatan-tbody"></tbody></table>
    </div>
    <div id="kegiatan-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Belum ada kegiatan penanganan yang tercatat.</div>
    <div id="kegiatan-loadmore" class="text-center mt-4"></div>`;

    // Usulan #7 & #10: state sortir kolom dan paginasi "muat lebih banyak" untuk tabel ini.
    const sortState = {key:null, dir:'asc'};
    const pageState = {shown:50, step:50};
    const terapkanKolomKegiatan = setupColPicker('kegiatan', KEGIATAN_KOLOM, pageState, ()=>renderRowsResetPage());
    function renderRows(){
      const q = document.getElementById('fk-search').value.toLowerCase();
      const kab = document.getElementById('fk-kabupaten').value;
      const jenis = document.getElementById('fk-jenis').value;
      const status = document.getElementById('fk-status').value;
      const sumber = document.getElementById('fk-sumber').value;
      const tglDari = document.getElementById('fk-tgl-dari').value;
      const tglSampai = document.getElementById('fk-tgl-sampai').value;
      let rows = kegiatan.filter(k=>{
        if(q && !((k.nama_ruas||'').toLowerCase().includes(q) || (k.kode_ruas||'').toLowerCase().includes(q) || (k.sub_kegiatan||'').toLowerCase().includes(q))) return false;
        if(kab && k.kabupaten_id!==kab) return false;
        if(jenis && k.jenis_penanganan!==jenis) return false;
        if(status && k.status_pekerjaan!==status) return false;
        if(sumber && k.sumber_dana!==sumber) return false;
        if(tglDari && (!k.tanggal_penanganan || k.tanggal_penanganan < tglDari)) return false;
        if(tglSampai && (!k.tanggal_penanganan || k.tanggal_penanganan > tglSampai)) return false;
        return true;
      });
      rows = applySort(rows, sortState, {
        ruas: k=>k.nama_ruas||'', jenis_penanganan: k=>k.jenis_penanganan||'', sub_kegiatan: k=>k.sub_kegiatan||'',
        tanggal_penanganan: k=>k.tanggal_penanganan||'', tanggal_selesai: k=>k.tanggal_selesai||'',
        biaya: k=>k.biaya!=null?Number(k.biaya):null, status_pekerjaan: k=>k.status_pekerjaan||'',
      });
      document.getElementById('kegiatan-count').textContent = rows.length;
      const totalRows = rows.length;
      const shownRows = rows.slice(0, pageState.shown);
      const tbody = document.getElementById('kegiatan-tbody');
      tbody.innerHTML = shownRows.map(k=>{
        const lewat = isLewatTenggat(k.tanggal_selesai, k.status_pekerjaan);
        const jumlahDokKurang = dokKurangById[k.id] || 0;
        const baru = !lewat && jumlahDokKurang<=0 && baruDiubahSejakJam(k);
        const rowCls = lewat ? 'row-lewat-tenggat' : (jumlahDokKurang>0 ? 'row-dok-kurang' : (baru ? 'row-baru-diubah' : ''));
        return `
        <tr class="row-hover ${rowCls}" data-id="${k.id}">
          <td data-col="foto">${fotoThumbHtml(k.foto_awal_path || k.foto_akhir_path)}</td>
          <td data-col="ruas"><div class="flex items-center gap-1.5"><span class="font-mono text-[12px] text-navy-700 font-semibold">${k.kode_ruas}</span>${copyBtn(k.kode_ruas,'Salin kode ruas')}</div><div class="text-[12.5px]">${k.nama_ruas}${baru?badgeBaru(k):''}</div></td>
          <td data-col="jenis_penanganan" class="capitalize">${(k.jenis_penanganan||'—').replaceAll('_',' ')}${k.kejadian_bencana_id?` <span class="text-[var(--bad)]" title="Menangani kejadian bencana: ${(k.bencana_jenis_kejadian||'—').replaceAll('_',' ')} · ${fmtDate(k.bencana_tanggal_kejadian)}">⚠</span>`:''}</td>
          <td data-col="sub_kegiatan" class="text-ink-500 text-[12.5px] max-w-[220px] truncate">${k.sub_kegiatan||'—'}</td>
          <td data-col="tanggal_penanganan" class="font-mono text-[12.5px]">${fmtDate(k.tanggal_penanganan)}</td>
          <td data-col="tanggal_selesai" class="font-mono text-[12.5px]">${k.tanggal_selesai? fmtDate(k.tanggal_selesai) : '—'}${lewat?` <span class="text-[var(--bad)]" title="Sudah lewat target penyelesaian">⚠</span>`:''}</td>
          <td data-col="biaya" class="font-mono text-[12.5px]">${fmtRp(k.biaya)}</td>
          <td data-col="status_pekerjaan"><span class="badge ${k.status_pekerjaan==='selesai'?'badge-baik':k.status_pekerjaan==='terhenti'?'badge-rusak_berat':'badge-sedang'} capitalize">${(k.status_pekerjaan||'—').replaceAll('_',' ')}</span>${jumlahDokKurang>0?` <span class="text-[var(--fair)]" title="${jumlahDokKurang} dokumen wajib belum lengkap">${icon('doc','w-3.5 h-3.5 inline -mt-0.5')}</span>`:''}</td>
          <td data-col="link_dokumentasi" class="max-w-[160px]">${k.link_dokumentasi?`<a href="${k.link_dokumentasi}" target="_blank" rel="noopener" data-stop-row class="text-navy-700 underline text-[12.5px] truncate block">Buka Link</a>`:'<span class="text-ink-400 text-[12.5px]">—</span>'}</td>
          ${isEditor()?`<td data-col="aksi">${actionBtns({onDetail:true, onEdit:true, onDelete:isAdmin()})}</td>`:''}
        </tr>`;
      }).join('');
      document.getElementById('kegiatan-empty').classList.toggle('hidden', totalRows>0);
      renderLoadMoreBtn(document.getElementById('kegiatan-loadmore'), totalRows, pageState, renderRows);
      terapkanKolomKegiatan(document.getElementById('kegiatan-tbody').closest('table'));
      hydrateFotoThumbs(tbody);
      tbody.querySelectorAll('tr').forEach(tr=>{
        const kg = kegiatan.find(k=>k.id===tr.dataset.id);
        tr.addEventListener('click', ()=>openKegiatanDetailModal(kg));
        tr.querySelector('[data-stop-row]')?.addEventListener('click', (e)=>e.stopPropagation());
        tr.querySelector('[data-act="detail"]')?.addEventListener('click', ()=>openKegiatanDetailModal(kg));
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', async ()=>{
          try{ const full = await api.penangananById(kg.id); openKegiatanFormModal(ruas, {id:kg.ruas_id}, {...kg, ...full}, ()=>viewKegiatan()); }
          catch(err){ alert('Gagal memuat data kegiatan: '+terjemahkanErrorDb(err)); }
        });
        tr.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
          if(!(await confirmDelete('Hapus kegiatan penanganan ini beserta kelengkapan dokumennya?'))) return;
          try{ await api.deletePenanganan(kg.id); viewKegiatan(); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
        });
      });
    }
    function renderRowsResetPage(){ pageState.shown = pageState.step; renderRows(); }
    document.getElementById('fk-search').addEventListener('input', debounce(renderRowsResetPage, 300));
    ['fk-kabupaten','fk-jenis','fk-status','fk-sumber','fk-tgl-dari','fk-tgl-sampai'].forEach(id=>document.getElementById(id).addEventListener('input', renderRowsResetPage));
    document.getElementById('fk-reset').addEventListener('click', ()=>{
      ['fk-search','fk-kabupaten','fk-jenis','fk-status','fk-sumber','fk-tgl-dari','fk-tgl-sampai'].forEach(id=>document.getElementById(id).value='');
      renderRowsResetPage();
    });
    document.getElementById('kegiatan-tbody').closest('table').querySelectorAll('thead th[data-sort-key]').forEach(th=>{
      wireSortableHeader(th, sortState, renderRows);
    });
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-kegiatan').addEventListener('click', ()=>openKegiatanFormModal(ruas, null, null, ()=>viewKegiatan())); }
    document.getElementById('kegiatan-export').innerHTML = exportButtons();
    wireExportButtons(document.getElementById('kegiatan-export'),
      ()=>exportExcel(kegiatan.map(k=>({
        'Kode Ruas': k.kode_ruas, 'Nama Ruas': k.nama_ruas, 'Jenis Penanganan': k.jenis_penanganan,
        'Sub Kegiatan': k.sub_kegiatan||'', 'Tgl Mulai': k.tanggal_penanganan||'', 'Tgl Selesai': k.tanggal_selesai||'',
        'Biaya': k.biaya||0, 'Status': k.status_pekerjaan, 'Sumber Dana': k.sumber_dana||'',
      })), 'sijalan_kegiatan_penanganan', 'Kegiatan'),
      ()=>exportPdfTabel('Kegiatan Penanganan Jalan', [
        {header:'Ruas', key:'kode_ruas'}, {header:'Jenis', key:'jenis_penanganan'}, {header:'Sub Kegiatan', key:'sub_kegiatan'},
        {header:'Mulai', key:'tanggal_penanganan'}, {header:'Selesai', key:'tanggal_selesai'}, {header:'Biaya', key:'biaya'}, {header:'Status', key:'status_pekerjaan'},
      ], kegiatan, 'sijalan_kegiatan_penanganan'));
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 11f. VIEW: DOKUMEN (matriks kelengkapan per tahap) -------------------
async function viewDokumen(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-96 w-full"></div>`;
  try{
    const kegiatan = await api.kegiatanList();
    if(!state.selectedDokKegiatanId || !kegiatan.some(k=>k.id===state.selectedDokKegiatanId)){
      state.selectedDokKegiatanId = kegiatan.length? kegiatan[0].id : null;
    }
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Dokumen</h1>
    <p class="text-ink-500 text-[13.5px]">Dokumen terkait pekerjaan/serah terima. Matriks kelengkapan dokumen per ruas jalan &amp; per tahap. Klik + Tambah pada dokumen yang diinginkan.</p></div>
    <div class="grid lg:grid-cols-[300px_1fr] gap-5 items-start">
      <div class="card p-2 max-h-[75vh] overflow-y-auto">
        <div class="text-[11px] font-bold uppercase tracking-wide text-ink-400 px-3 pt-2 pb-1">Ruas Jalan &amp; Kegiatan Penanganan</div>
        ${kegiatan.length? kegiatan.map(k=>`
          <button data-kid="${k.id}" class="w-full text-left p-3 rounded-lg mb-1 ${state.selectedDokKegiatanId===k.id?'bg-[#EEF3FA]':'hover:bg-[#F5F7FA]'}">
            <div class="text-[11px] font-mono text-ink-400">${fmtDate(k.tanggal_penanganan)}</div>
            <div class="font-semibold text-[13.5px] text-ink-900">${k.kode_ruas} — ${k.nama_ruas}</div>
            <div class="text-[12px] text-ink-500 capitalize">${(k.jenis_penanganan||'—').replaceAll('_',' ')}${k.sub_kegiatan? ' · '+k.sub_kegiatan:''}</div>
          </button>`).join('') : `<div class="p-6 text-center text-ink-400 text-[13px]">Belum ada kegiatan penanganan.</div>`}
      </div>
      <div id="dok-detail">${roadLoader('Memuat detail dokumen…', 90)}</div>
    </div>`;
    v.querySelectorAll('[data-kid]').forEach(btn=>btn.addEventListener('click', ()=>{ state.selectedDokKegiatanId = btn.dataset.kid; viewDokumen(); }));

    else document.getElementById('dok-detail').innerHTML = `<div class="card p-10 text-center text-ink-400 text-[13.5px]">Pilih kegiatan penanganan di sebelah kiri.</div>`;
  }catch(err){ v.innerHTML = errorPanel(err); }
}

async function renderDokDetail(kegiatanId, kegiatan){
  const box = document.getElementById('dok-detail');
  if(!box) return;
  box.innerHTML = roadLoader('Memuat detail dokumen…', 90);
  try{
    const rows = await api.dokumenMatrix(kegiatanId);
    const done = rows.filter(r=>r.status==='sudah').length;
    const byTahap = {};
    rows.forEach(r=>{ (byTahap[r.tahap_urutan] ||= {nama:r.tahap_nama, items:[]}).items.push(r); });
    const tahapKeys = Object.keys(byTahap).sort((a,b)=>a-b);
    box.innerHTML = `
    <div class="card p-4 mb-4">
      <div class="text-[11.5px] font-mono text-ink-400">${fmtDate(kegiatan?.tanggal_penanganan)}</div>
      <div class="font-display font-bold text-[16px]">${kegiatan?.kode_ruas||''} — ${kegiatan?.nama_ruas||''}</div>
      <div class="text-[12.5px] text-ink-500 capitalize">${(kegiatan?.jenis_penanganan||'').replaceAll('_',' ')}${kegiatan?.sub_kegiatan?' · '+kegiatan.sub_kegiatan:''}</div>
      <div class="text-[11.5px] text-ink-400 mt-1 font-mono">${done}/${rows.length} dokumen lengkap</div>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-2">
      ${tahapKeys.map(tk=>{
        const t = byTahap[tk];
        const tdone = t.items.filter(i=>i.status==='sudah').length;
        return `<div class="card p-4 shrink-0" style="width:260px">
          <div class="text-[11px] font-bold uppercase tracking-wide text-navy-700">TAHAP ${tk}</div>
          <div class="text-[12.5px] font-semibold text-ink-800 mb-1">${t.nama}</div>
          <div class="text-[11px] text-ink-400 font-mono mb-3">${tdone}/${t.items.length}</div>
          <div class="space-y-3">
            ${t.items.map(it=>`
              <div data-dokid="${it.dokumen_id}">
                <div class="text-[12.5px] font-medium ${it.status==='sudah'?'text-ink-900':'text-ink-600'}">${it.nama_dokumen}${it.wajib===false?' <span class="text-ink-400">(opsional)</span>':''}</div>
                ${it.status==='sudah' ? `
                  <div class="flex items-center flex-wrap gap-2 mt-1">
                    <span class="badge badge-baik">Lengkap</span>
                    ${it.link_dokumen?`<a href="${it.link_dokumen}" target="_blank" class="text-[11.5px] text-navy-700 underline">Buka</a>`:''}
                    ${isEditor()?`<button data-act="undo" class="text-[11px] text-ink-400 hover:text-[var(--bad)]">Batalkan</button>`:''}
                  </div>` : (isEditor()? `<button data-act="tambah" class="mt-1 w-full text-[12px] text-ink-400 border border-dashed border-line rounded-lg py-1.5 hover:border-navy-600 hover:text-navy-700">+ Tambah</button>` : `<div class="text-[11px] text-ink-400 mt-1">Belum ada</div>`)}
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
    if(isEditor()){
      box.querySelectorAll('[data-act="tambah"]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const wrap = btn.closest('[data-dokid]');
          const dokId = wrap.dataset.dokid;
          btn.outerHTML = `
            <div class="flex gap-1.5 mt-1">
              <input data-link-input placeholder="Link dokumen (opsional)" class="!text-[11.5px] !py-1">
              <button data-act="save" class="btn-primary !py-1 !px-2.5 !text-[11.5px]">OK</button>
            </div>`;
          wrap.querySelector('[data-act="save"]').addEventListener('click', async ()=>{
            const link = wrap.querySelector('[data-link-input]').value || null;
            try{
              await api.updateDokumen(dokId, {status:'sudah', link_dokumen:link, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id});
              renderDokDetail(kegiatanId, kegiatan);
            }catch(err){ alert('Gagal menyimpan: '+terjemahkanErrorDb(err)); }
          });
        });
      });
      box.querySelectorAll('[data-act="undo"]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const dokId = btn.closest('[data-dokid]').dataset.dokid;
          try{ await api.updateDokumen(dokId, {status:'belum'}); renderDokDetail(kegiatanId, kegiatan); }
          catch(err){ alert('Gagal memperbarui: '+terjemahkanErrorDb(err)); }
        });
      });
    }
  }catch(err){ box.innerHTML = errorPanel(err); }
}

async function viewAnggaran(){
