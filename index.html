  v.innerHTML = `<div class="skel h-72 w-full mb-5"></div>${skeletonTable(5)}`;
  try{
    const [rekap, rekapKab, kabupaten] = await Promise.all([api.rekapAnggaran(), api.rekapAnggaranKabupaten(), api.kabupaten()]);
    const tahunOpt = [...new Set([...rekap.map(r=>r.tahun), ...rekapKab.map(r=>r.tahun)])].sort((a,b)=>b-a);
    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Anggaran &amp; Realisasi</h1>
      <p class="text-ink-500 text-[13.5px]">Rekap pagu dan realisasi anggaran penanganan jalan per tahun</p></div>
      <div id="anggaran-export"></div>
    </div>
    <div class="card p-5 mb-5"><div style="height:300px"><canvas id="chart-angg-detail"></canvas></div></div>
    <div class="flex flex-wrap gap-3 mb-4">
      <select id="fa-tahun" class="max-w-[140px]"><option value="">Semua Tahun</option>${tahunOpt.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
      <select id="fa-sumber" class="max-w-[190px]"><option value="">Semua Sumber Dana</option>${SUMBER_DANA_OPT.map(([vv,l])=>`<option value="${vv}">${l}</option>`).join('')}</select>
      <button id="fa-reset" type="button" class="btn-ghost !py-1.5 !px-3 text-[12.5px]">Reset Filter</button>
    </div>
    <div class="card overflow-x-auto mb-5">
      <table><thead><tr><th>Tahun</th><th>Sumber Dana</th><th>Pagu</th><th>Realisasi</th><th>% Realisasi</th></tr></thead>
      <tbody id="anggaran-tbody"></tbody></table>
    </div>
    <div class="flex items-center justify-between flex-wrap gap-3 mb-3">
      <div><h2 class="font-display font-bold text-lg text-ink-900">Rekap per Kabupaten/Kota</h2>
      <p class="text-ink-500 text-[13px]">Pagu dan realisasi anggaran per wilayah, mengikuti filter Tahun di atas</p></div>
      <select id="fa-kab" class="max-w-[220px]"><option value="">Semua Kabupaten/Kota</option>${kabupaten.map(k=>`<option value="${k.id}">${k.nama}</option>`).join('')}</select>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Kabupaten/Kota</th><th>Tahun</th><th>Pagu</th><th>Realisasi</th><th>% Realisasi</th></tr></thead>
      <tbody id="anggaran-kab-tbody"></tbody></table>
    </div>
    <div id="anggaran-kab-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Tidak ada data yang cocok dengan filter.</div>`;

    function renderTahunRows(){
      const tahun = document.getElementById('fa-tahun').value;
      const sumber = document.getElementById('fa-sumber').value;
      const rows = rekap.filter(r=>{
        if(tahun && String(r.tahun)!==tahun) return false;
        if(sumber && r.sumber_dana!==sumber) return false;
        return true;
      });
      document.getElementById('anggaran-tbody').innerHTML = rows.length? rows.map(r=>`
        <tr><td class="font-mono font-semibold">${r.tahun}</td><td>${(r.sumber_dana||'—').replaceAll('_',' ')}</td>
        <td class="font-mono">${fmtRp(r.total_pagu)}</td><td class="font-mono">${fmtRp(r.total_realisasi)}</td>
        <td><div class="flex items-center gap-2"><div class="w-24 h-1.5 bg-line rounded-full overflow-hidden"><div class="h-full bg-navy-700" style="width:${Math.min(r.persen_realisasi||0,100)}%"></div></div><span class="font-mono text-[12.5px]">${fmtNum(r.persen_realisasi,1)}%</span></div></td></tr>`).join('')
        : `<tr><td colspan="5" class="text-center text-ink-400 py-8">Tidak ada data anggaran yang cocok dengan filter.</td></tr>`;
    }
    function renderKabRows(){
      const tahun = document.getElementById('fa-tahun').value;
      const kab = document.getElementById('fa-kab').value;
      const rows = rekapKab.filter(r=>{
        if(tahun && String(r.tahun)!==tahun) return false;
        if(kab && r.kabupaten_id!==kab) return false;
        return true;
      });
      document.getElementById('anggaran-kab-tbody').innerHTML = rows.map(r=>`
        <tr><td class="font-medium">${r.kabupaten}</td><td class="font-mono">${r.tahun}</td>
        <td class="font-mono">${fmtRp(r.total_pagu)}</td><td class="font-mono">${fmtRp(r.total_realisasi)}</td>
        <td><div class="flex items-center gap-2"><div class="w-24 h-1.5 bg-line rounded-full overflow-hidden"><div class="h-full bg-navy-700" style="width:${Math.min(r.persen_realisasi||0,100)}%"></div></div><span class="font-mono text-[12.5px]">${fmtNum(r.persen_realisasi,1)}%</span></div></td></tr>`).join('');
      document.getElementById('anggaran-kab-empty').classList.toggle('hidden', rows.length>0);
    }
    ['fa-tahun','fa-sumber'].forEach(id=>document.getElementById(id).addEventListener('input', renderTahunRows));
    ['fa-tahun','fa-kab'].forEach(id=>document.getElementById(id).addEventListener('input', renderKabRows));
    document.getElementById('fa-reset').addEventListener('click', ()=>{
      document.getElementById('fa-tahun').value=''; document.getElementById('fa-sumber').value=''; document.getElementById('fa-kab').value='';
      renderTahunRows(); renderKabRows();
    });
    renderTahunRows(); renderKabRows();

    document.getElementById('anggaran-export').innerHTML = exportButtons();
    wireExportButtons(document.getElementById('anggaran-export'),
      ()=>exportExcel(rekap.map(r=>({ 'Tahun': r.tahun, 'Sumber Dana': r.sumber_dana||'', 'Pagu': r.total_pagu||0, 'Realisasi': r.total_realisasi||0, '% Realisasi': r.persen_realisasi||0 })), 'sijalan_anggaran', 'Anggaran'),
      ()=>exportPdfTabel('Anggaran & Realisasi', [
        {header:'Tahun', key:'tahun'}, {header:'Sumber Dana', key:'sumber_dana'}, {header:'Pagu', key:'total_pagu'}, {header:'Realisasi', key:'total_realisasi'}, {header:'% Realisasi', key:'persen_realisasi'},
      ], rekap, 'sijalan_anggaran'));
    if(rekap.length){
      const tahunList = [...new Set(rekap.map(r=>r.tahun))].sort();
      mkChart('chart-angg-detail','line',{labels:tahunList, datasets:[
        {label:'Pagu', data:tahunList.map(t=>rekap.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_pagu||0),0)), borderColor:'#16385E', backgroundColor:'#16385E22', fill:true, tension:.3},
        {label:'Realisasi', data:tahunList.map(t=>rekap.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_realisasi||0),0)), borderColor:'#F2A93B', backgroundColor:'#F2A93B33', fill:true, tension:.3},
      ]}, {scales:{y:{ticks:{callback:v=>fmtRp(v)}}}});
    }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 12b. VIEW: PENUGASAN SURVEI --------------------------------------------
async function viewPenugasan(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-10 w-full mb-4"></div>${skeletonTable(6)}`;
  try{
    const [penugasan, ruas, staf] = await Promise.all([api.penugasanList(), api.ruasList(), api.staffList()]);
    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Penugasan Survei</h1>
      <p class="text-ink-500 text-[13.5px]">Penugasan staf untuk survei kondisi ruas jalan &amp; pemantauan progresnya</p></div>
      ${isPenugas()?`<button id="btn-add-penugasan" class="btn-accent">+ Tugaskan Survei</button>`:''}
    </div>
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="pn-search" placeholder="Cari ruas / nama staf…" class="max-w-xs">
      <select id="pn-status" class="max-w-[200px]"><option value="">Semua Status</option>${Object.keys(PENUGASAN_STATUS_LABEL).map(s=>`<option value="${s}">${PENUGASAN_STATUS_LABEL[s]}</option>`).join('')}</select>
      ${!isPenugas()?`<label class="flex items-center gap-2 text-[12.5px] text-ink-600"><input id="pn-mine" type="checkbox" class="!w-auto">Hanya tugas saya</label>`:''}
      <button id="pn-reset" type="button" class="btn-ghost !py-1.5 !px-3 text-[12.5px]">Reset Filter</button>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th data-sort-key="ruas">Ruas</th><th data-sort-key="kabupaten">Kab/Kota</th><th data-sort-key="staf">Staf</th><th data-sort-key="target">Target</th><th data-sort-key="status">Status</th><th>Catatan</th>${isPenugas()?'<th>Aksi</th>':''}</tr></thead>
      <tbody id="penugasan-tbody"></tbody></table>
    </div>
    <div id="penugasan-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Belum ada penugasan survei yang cocok dengan filter.</div>
    <div id="penugasan-loadmore" class="text-center mt-4"></div>`;

    // Usulan #7 & #10: state sortir kolom dan paginasi "muat lebih banyak" untuk tabel ini.
    const sortState = {key:null, dir:'asc'};
    const pageState = {shown:50, step:50};
    function renderRows(){
      const q = document.getElementById('pn-search').value.toLowerCase();
      const st = document.getElementById('pn-status').value;
      const mineEl = document.getElementById('pn-mine');
      const mine = mineEl ? mineEl.checked : false;
      let rows = penugasan.filter(p=>{
        if(q && !((p.nama_ruas||'').toLowerCase().includes(q) || (p.kode_ruas||'').toLowerCase().includes(q) || (p.nama_petugas||'').toLowerCase().includes(q))) return false;
        if(st && p.status !== st) return false;
        if(mine && !(p.petugas_ids||[]).includes(state.user.id)) return false;
        return true;
      });
      rows = applySort(rows, sortState, {
        ruas: p=>p.nama_ruas||'', kabupaten: p=>p.kabupaten||'', staf: p=>p.nama_petugas||'',
        target: p=>p.target_tanggal||'', status: p=>Object.keys(PENUGASAN_STATUS_LABEL).indexOf(p.status),
      });
      const totalRows = rows.length;
      const shownRows = rows.slice(0, pageState.shown);
      const tbody = document.getElementById('penugasan-tbody');
      tbody.innerHTML = shownRows.map(p=>{
        const canUpdateStatus = isPenugas() || (p.petugas_ids||[]).includes(state.user.id);
        const lewat = isLewatTenggat(p.target_tanggal, p.status);
        const baru = !lewat && baruDiubahSejakJam(p);
        return `
        <tr data-id="${p.id}" class="${lewat?'row-lewat-tenggat':(baru?'row-baru-diubah':'')}">
          <td class="font-medium">${p.kode_ruas? `<span class="inline-flex items-center gap-1"><span class="font-mono text-[12px] text-navy-700 font-semibold">${p.kode_ruas}</span>${copyBtn(p.kode_ruas,'Salin kode ruas')}</span> · `:''}${p.nama_ruas}${baru?badgeBaru(p):''}</td>
          <td class="text-ink-500">${p.kabupaten||'—'}</td>
          <td>${p.nama_petugas}</td>
          <td class="font-mono text-[12.5px]">${p.target_tanggal? fmtDate(p.target_tanggal) : '—'}${lewat?` <span class="text-[var(--bad)]" title="Sudah lewat tenggat">⚠</span>`:''}</td>
          <td>${canUpdateStatus? `
            <select data-status-id="${p.id}" class="pn-status-select max-w-[170px]" style="border-color:${PENUGASAN_STATUS_COLOR[p.status]}">
              ${Object.keys(PENUGASAN_STATUS_LABEL).map(s=>`<option value="${s}" ${p.status===s?'selected':''}>${PENUGASAN_STATUS_LABEL[s]}</option>`).join('')}
            </select>` : `<span class="badge" style="background:${PENUGASAN_STATUS_COLOR[p.status]}22;color:${PENUGASAN_STATUS_COLOR[p.status]}">${PENUGASAN_STATUS_LABEL[p.status]}</span>`}
          </td>
          <td class="text-ink-500 text-[12.5px] max-w-[220px] truncate" title="${p.catatan||''}">${p.catatan||'—'}</td>
          ${isPenugas()?`<td>${actionBtns({onEdit:true, onDelete:isAdmin()})}</td>`:''}
        </tr>`;
      }).join('');
      document.getElementById('penugasan-empty').classList.toggle('hidden', totalRows>0);
      renderLoadMoreBtn(document.getElementById('penugasan-loadmore'), totalRows, pageState, renderRows);

      tbody.querySelectorAll('.pn-status-select').forEach(sel=>sel.addEventListener('change', async ()=>{
        try{ await api.updatePenugasan(sel.dataset.statusId, {status: sel.value}); const item = penugasan.find(x=>x.id===sel.dataset.statusId); if(item) item.status = sel.value; sel.style.borderColor = PENUGASAN_STATUS_COLOR[sel.value]; }
        catch(err){ alert('Gagal memperbarui status: '+terjemahkanErrorDb(err)); }
      }));
      tbody.querySelectorAll('[data-act="edit"]').forEach(btn=>btn.addEventListener('click', (e)=>{
        const id = e.target.closest('tr').dataset.id;
        openPenugasanFormModal(ruas, staf, penugasan.find(x=>x.id===id), ()=>viewPenugasan());
      }));
      tbody.querySelectorAll('[data-act="delete"]').forEach(btn=>btn.addEventListener('click', async (e)=>{
        const id = e.target.closest('tr').dataset.id;
        if(!(await confirmDelete('Hapus penugasan survei ini?'))) return;
        try{ await api.deletePenugasan(id); viewPenugasan(); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
      }));
    }
    function renderRowsResetPage(){ pageState.shown = pageState.step; renderRows(); }
    document.getElementById('pn-search').addEventListener('input', debounce(renderRowsResetPage, 300));
    document.getElementById('pn-status').addEventListener('input', renderRowsResetPage);
    document.getElementById('pn-mine')?.addEventListener('change', renderRowsResetPage);
    document.getElementById('pn-reset').addEventListener('click', ()=>{
      document.getElementById('pn-search').value=''; document.getElementById('pn-status').value='';
      const mineEl = document.getElementById('pn-mine'); if(mineEl) mineEl.checked=false;
      renderRowsResetPage();
    });
    document.getElementById('penugasan-tbody').closest('table').querySelectorAll('thead th[data-sort-key]').forEach(th=>{
      wireSortableHeader(th, sortState, renderRows);
    });
    renderRows();
    if(isPenugas()){ document.getElementById('btn-add-penugasan').addEventListener('click', ()=>openPenugasanFormModal(ruas, staf, null, ()=>viewPenugasan())); }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

function openPenugasanFormModal(ruasList, stafList, editData=null, onSaved=null){
  const isEdit = !!editData;
  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>
    <h3 class="font-display font-extrabold text-lg mb-1">${isEdit?'Ubah Penugasan':'Tugaskan Survei'}</h3>
    <p class="text-[13px] text-ink-500 mb-4">Pilih ruas jalan dan staf yang ditugaskan melakukan survei kondisi</p>
    <form id="form-penugasan" class="space-y-3">
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Ruas Jalan *</label>
        <select id="pn-ruas" required ${isEdit?'disabled':''}>
          <option value="">— Pilih ruas —</option>
          ${ruasList.map(r=>`<option value="${r.id}" ${editData?.ruas_id===r.id?'selected':''}>${r.kode_ruas} · ${r.nama_ruas}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Staf Petugas * <span class="font-normal text-ink-400">(bisa pilih lebih dari satu — untuk tim survei)</span></label>
        <div id="pn-petugas-list" class="max-h-40 overflow-y-auto border border-[#E4E8F0] rounded-lg p-2 space-y-1">
          ${stafList.map(s=>`<label class="flex items-center gap-2 text-[13px] py-0.5">
            <input type="checkbox" value="${s.id}" class="pn-petugas-cb !w-auto" ${(editData?.petugas_ids||[]).includes(s.id)?'checked':''}>
            ${s.nama}
          </label>`).join('')}
        </div>
        ${stafList.length===0?`<p class="text-[11.5px] text-ink-400 mt-1">Belum ada staf berperan "Petugas Lapangan". Atur peran pengguna di menu Pengguna terlebih dahulu.</p>`:''}
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[12.5px] font-semibold text-ink-600">Target Tanggal</label><input id="pn-target" type="date" value="${editData?.target_tanggal||''}"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Status</label><select id="pn-status-input">${Object.keys(PENUGASAN_STATUS_LABEL).map(s=>`<option value="${s}" ${(editData?.status||'belum_disurvei')===s?'selected':''}>${PENUGASAN_STATUS_LABEL[s]}</option>`).join('')}</select></div>
      </div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Catatan</label><textarea id="pn-catatan" rows="2" placeholder="Instruksi atau catatan tambahan…">${editData?.catatan||''}</textarea></div>
      <div id="pn-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Penugasan'}</button>
    </form>`);
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());
  overlay.querySelector('#form-penugasan').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#pn-err');
    errBox.classList.add('hidden');
    const petugasIds = Array.from(overlay.querySelectorAll('.pn-petugas-cb:checked')).map(cb=>cb.value);
    if(!petugasIds.length){
      errBox.textContent = 'Pilih minimal satu staf petugas.';
      errBox.classList.remove('hidden');
      return;
    }
    const payload = {
      ruas_id: editData?.ruas_id || overlay.querySelector('#pn-ruas').value,
      target_tanggal: overlay.querySelector('#pn-target').value || null,
      status: overlay.querySelector('#pn-status-input').value,
      catatan: overlay.querySelector('#pn-catatan').value || null,
    };
    if(!isEdit) payload.ditugaskan_oleh = state.user.id;
    try{
      if(isEdit){ await api.updatePenugasan(editData.id, payload, petugasIds); }
      else{ await api.insertPenugasan(payload, petugasIds); }
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved();
    }catch(err){ errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden'); }
  });
}

async function loadSegmenOptionsInto(selectEl, ruasId, selectedSegId){

    state.ruasCache = ruas;
    box.innerHTML = `

      </div>
      <div class="flex items-center gap-2">
        ${colPickerHtml('jembatan')}
        ${isEditor()?`<button id="btn-add-jembatan" class="btn-accent">+ Tambah Jembatan</button>`:''}
      </div>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th data-col="nama_jembatan" data-sort-key="nama_jembatan">Nama Jembatan</th><th data-col="ruas" data-sort-key="ruas">Ruas</th><th data-col="sta_awal" data-sort-key="sta_awal">STA Awal</th><th data-col="sta_akhir" data-sort-key="sta_akhir">STA Akhir</th><th data-col="panjang_m" data-sort-key="panjang_m">Panjang (m)</th><th data-col="lebar_m" data-sort-key="lebar_m">Lebar (m)</th><th data-col="jenis_konstruksi" data-sort-key="jenis_konstruksi">Konstruksi</th><th data-col="kondisi" data-sort-key="kondisi">Kondisi</th><th data-col="tahun_dibangun" data-sort-key="tahun_dibangun">Tahun</th>${isEditor()?'<th data-col="aksi" data-wajib></th>':''}</tr></thead>
      <tbody id="jembatan-tbody"></tbody></table>
    </div>
    <div id="jembatan-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Tidak ada data yang cocok dengan filter.</div>
    <div id="jembatan-loadmore" class="text-center mt-4"></div>`;

    // Usulan #7 & #10: state sortir kolom dan paginasi "muat lebih banyak" untuk tabel ini.
    const sortState = {key:null, dir:'asc'};
    const pageState = {shown:50, step:50};
    const terapkanKolomJembatan = setupColPicker('jembatan', JEMBATAN_KOLOM, pageState, ()=>renderRowsResetPage());
    function renderRows(){
      const q = document.getElementById('fj-search').value.toLowerCase();
      const kd = document.getElementById('fj-kondisi').value;
      let rows = data.filter(j=>{
        if(q && !((j.nama_jembatan||'').toLowerCase().includes(q) || (j.ruas_jalan?.nama_ruas||'').toLowerCase().includes(q) || (j.ruas_jalan?.kode_ruas||'').toLowerCase().includes(q))) return false;
        if(kd && j.kondisi!==kd) return false;
        return true;
      });
      rows = applySort(rows, sortState, {
        nama_jembatan: j=>j.nama_jembatan||'', ruas: j=>j.ruas_jalan?.nama_ruas||'',
        sta_awal: j=>j.sta_awal!=null?Number(j.sta_awal):null, sta_akhir: j=>j.sta_akhir!=null?Number(j.sta_akhir):null,
        panjang_m: j=>j.panjang_m!=null?Number(j.panjang_m):null, lebar_m: j=>j.lebar_m!=null?Number(j.lebar_m):null,
        jenis_konstruksi: j=>j.jenis_konstruksi||'', kondisi: j=>j.kondisi!=null? KONDISI_ORDER.indexOf(j.kondisi) : 999,
        tahun_dibangun: j=>j.tahun_dibangun!=null?Number(j.tahun_dibangun):null,
      });
      const totalRows = rows.length;
      const shownRows = rows.slice(0, pageState.shown);
      document.getElementById('jembatan-tbody').innerHTML = shownRows.map(j=>{
        const baru = baruDiubahSejakJam(j);
        return `
        <tr data-id="${j.id}" class="${baru?'row-baru-diubah':''}">
          <td data-col="nama_jembatan" class="font-medium">${j.nama_jembatan}${badgeBaru(j)}</td>
          <td data-col="ruas">${j.ruas_jalan?`${j.ruas_jalan.kode_ruas} — ${j.ruas_jalan.nama_ruas}`:'—'}</td>
          <td data-col="sta_awal" class="font-mono">${j.sta_awal!=null?fmtNum(j.sta_awal,3):'—'}</td>
          <td data-col="sta_akhir" class="font-mono">${j.sta_akhir!=null?fmtNum(j.sta_akhir,3):'—'}</td>
          <td data-col="panjang_m" class="font-mono">${fmtNum(j.panjang_m,1)}</td>
          <td data-col="lebar_m" class="font-mono">${fmtNum(j.lebar_m,1)}</td>
          <td data-col="jenis_konstruksi">${j.jenis_konstruksi||'—'}</td>
          <td data-col="kondisi">${badge(j.kondisi)}</td>
          <td data-col="tahun_dibangun" class="font-mono">${j.tahun_dibangun||'—'}</td>
          ${isEditor()?`<td data-col="aksi">${actionBtns({onEdit:true, onDelete:isAdmin()})}</td>`:''}
        </tr>`;}).join('');
      document.getElementById('jembatan-empty').classList.toggle('hidden', totalRows>0 || data.length===0);
      const tbody = document.getElementById('jembatan-tbody');
      if(data.length===0) tbody.innerHTML = `<tr><td colspan="10" class="text-center text-ink-400 py-8">Belum ada data jembatan.</td></tr>`;
      renderLoadMoreBtn(document.getElementById('jembatan-loadmore'), totalRows, pageState, renderRows);
      terapkanKolomJembatan(tbody.closest('table'));
      tbody.querySelectorAll('tr[data-id]').forEach(tr=>{
        const j = data.find(x=>x.id===tr.dataset.id);
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openJembatanFormModal(ruas, j, renderJembatanTab));
        tr.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
          if(!(await confirmDelete('Hapus data jembatan ini?'))) return;
          try{ await api.deleteJembatan(j.id); renderJembatanTab(); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
        });
      });
    }
    function renderRowsResetPage(){ pageState.shown = pageState.step; renderRows(); }
    document.getElementById('fj-search').addEventListener('input', debounce(renderRowsResetPage, 300));
    document.getElementById('fj-kondisi').addEventListener('input', renderRowsResetPage);
    document.getElementById('fj-reset').addEventListener('click', ()=>{
      document.getElementById('fj-search').value=''; document.getElementById('fj-kondisi').value='';
      renderRowsResetPage();
    });
    document.getElementById('jembatan-tbody').closest('table').querySelectorAll('thead th[data-sort-key]').forEach(th=>{
      wireSortableHeader(th, sortState, renderRows);
    });
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-jembatan').addEventListener('click', ()=>openJembatanFormModal(ruas, null, renderJembatanTab)); }
  }catch(err){ box.innerHTML = errorPanel(err); }
}
function openJembatanFormModal(ruasList, editData=null, onSaved=null){

  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>
    <h3 class="font-display font-extrabold text-lg mb-4">${isEdit?'Ubah Jembatan':'Tambah Jembatan'}</h3>

        <div><label class="text-[12.5px] font-semibold text-ink-600">STA Akhir</label><input id="jb-sta-akhir" type="number" step="0.001" value="${editData?.sta_akhir??''}"></div>

      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[12.5px] font-semibold text-ink-600">Jenis Konstruksi</label><input id="jb-konstruksi" placeholder="mis. Beton, Rangka Baja" value="${editData?.jenis_konstruksi||''}"></div>

          <option value="">—</option>
          <option value="baik" ${editData?.kondisi==='baik'?'selected':''}>Baik</option>
          <option value="sedang" ${editData?.kondisi==='sedang'?'selected':''}>Sedang</option>
          <option value="rusak_ringan" ${editData?.kondisi==='rusak_ringan'?'selected':''}>Rusak Ringan</option>
          <option value="rusak_berat" ${editData?.kondisi==='rusak_berat'?'selected':''}>Rusak Berat</option>
        </select></div>
      <div id="jb-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Jembatan'}</button>
    </form>`);
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());
  overlay.querySelector('#form-jembatan').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#jb-err');
    const payload = {
      ruas_id: overlay.querySelector('#jb-ruas').value,
      nama_jembatan: overlay.querySelector('#jb-nama').value,
      sta_awal: overlay.querySelector('#jb-sta-awal').value || null,
      sta_akhir: overlay.querySelector('#jb-sta-akhir').value || null,
      panjang_m: overlay.querySelector('#jb-panjang').value || null,
      lebar_m: overlay.querySelector('#jb-lebar').value || null,
      jenis_konstruksi: overlay.querySelector('#jb-konstruksi').value || null,
      tahun_dibangun: overlay.querySelector('#jb-tahun').value || null,
      kondisi: overlay.querySelector('#jb-kondisi').value || null,
    };
    if(!payload.ruas_id){ errBox.textContent='Pilih ruas jalan.'; errBox.classList.remove('hidden'); return; }
    try{
      if(isEdit){ await api.updateJembatan(editData.id, payload); } else { await api.insertJembatan(payload); }
      overlay.remove();
      notifikasiToast('Data berhasil disimpan.', 'success');
      if(onSaved) onSaved();
    }catch(err){ errBox.textContent = terjemahkanErrorDb(err); errBox.classList.remove('hidden'); }
  });
}

async function renderPerlengkapanTab(){
  const box = document.getElementById('aset-body');
  try{
    const [data, ruas] = await Promise.all([api.perlengkapanList(), api.ruasList()]);
    state.ruasCache = ruas;
    const jenisOpt = [...new Set(data.map(p=>p.jenis).filter(Boolean))].sort();
    box.innerHTML = `
    <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
      <div class="flex flex-wrap gap-3">
        <input id="fp-search" placeholder="Cari ruas / segmen…" class="max-w-xs">
        <select id="fp-jenis" class="max-w-[190px]"><option value="">Semua Jenis</option>${jenisOpt.map(j=>`<option value="${j}">${j.replaceAll('_',' ')}</option>`).join('')}</select>
        <select id="fp-kondisi" class="max-w-[180px]"><option value="">Semua Kondisi</option>${KONDISI_ORDER.map(k=>`<option value="${k}">${KONDISI_LABEL[k]}</option>`).join('')}</select>
        <button id="fp-reset" type="button" class="btn-ghost !py-1.5 !px-3 text-[12.5px]">Reset Filter</button>
      </div>
      ${isEditor()?`<button id="btn-add-perlengkapan" class="btn-accent">+ Tambah Perlengkapan</button>`:''}
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Ruas</th><th>Segmen</th><th data-sort-key="jenis">Jenis</th><th data-sort-key="sta_awal">STA Awal</th><th data-sort-key="sta_akhir">STA Akhir</th><th data-sort-key="jumlah">Jumlah</th><th data-sort-key="kondisi">Kondisi</th>${isEditor()?'<th></th>':''}</tr></thead>
      <tbody id="perlengkapan-tbody"></tbody></table>
    </div>
    <div id="perlengkapan-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Tidak ada data yang cocok dengan filter.</div>
    <div id="perlengkapan-loadmore" class="text-center mt-4"></div>`;

    // Usulan #7 & #10: state sortir kolom dan paginasi "muat lebih banyak" untuk tabel ini.
    const sortState = {key:null, dir:'asc'};
    const pageState = {shown:50, step:50};
    function renderRows(){
      const q = document.getElementById('fp-search').value.toLowerCase();
      const jenis = document.getElementById('fp-jenis').value;
      const kd = document.getElementById('fp-kondisi').value;
      let rows = data.filter(p=>{
        const namaRuas = p.segmen_jalan?.ruas_jalan?.nama_ruas||''; const kodeRuas = p.segmen_jalan?.ruas_jalan?.kode_ruas||''; const kodeSeg = p.segmen_jalan?.kode_segmen||'';
        if(q && !(namaRuas.toLowerCase().includes(q) || kodeRuas.toLowerCase().includes(q) || kodeSeg.toLowerCase().includes(q))) return false;
        if(jenis && p.jenis!==jenis) return false;
        if(kd && p.kondisi!==kd) return false;
        return true;
      });
      rows = applySort(rows, sortState, {
        jenis: p=>p.jenis||'', sta_awal: p=>p.sta_awal!=null?Number(p.sta_awal):null, sta_akhir: p=>p.sta_akhir!=null?Number(p.sta_akhir):null,
        jumlah: p=>p.jumlah!=null?Number(p.jumlah):null, kondisi: p=>p.kondisi!=null? KONDISI_ORDER.indexOf(p.kondisi) : 999,
      });
      const totalRows = rows.length;
      const shownRows = rows.slice(0, pageState.shown);
      document.getElementById('perlengkapan-tbody').innerHTML = shownRows.map(p=>`
        <tr data-id="${p.id}">
          <td>${p.segmen_jalan?.ruas_jalan? `${p.segmen_jalan.ruas_jalan.kode_ruas} — ${p.segmen_jalan.ruas_jalan.nama_ruas}`:'—'}</td>
          <td class="font-mono text-[12.5px]">${p.segmen_jalan?.kode_segmen||'—'}</td>
          <td class="capitalize">${(p.jenis||'—').replaceAll('_',' ')}</td>
          <td class="font-mono">${p.sta_awal!=null?fmtNum(p.sta_awal,3):'—'}</td>
          <td class="font-mono">${p.sta_akhir!=null?fmtNum(p.sta_akhir,3):'—'}</td>
          <td class="font-mono">${p.jumlah??'—'}</td>
          <td>${badge(p.kondisi)}</td>
          ${isEditor()?`<td>${actionBtns({onEdit:true, onDelete:isAdmin()})}</td>`:''}
        </tr>`).join('');
      document.getElementById('perlengkapan-empty').classList.toggle('hidden', totalRows>0 || data.length===0);
      const tbody = document.getElementById('perlengkapan-tbody');
      if(data.length===0) tbody.innerHTML = `<tr><td colspan="8" class="text-center text-ink-400 py-8">Belum ada data perlengkapan jalan.</td></tr>`;
      renderLoadMoreBtn(document.getElementById('perlengkapan-loadmore'), totalRows, pageState, renderRows);
      tbody.querySelectorAll('tr[data-id]').forEach(tr=>{
        const p = data.find(x=>x.id===tr.dataset.id);
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>openPerlengkapanFormModal(ruas, p, renderPerlengkapanTab));
        tr.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
          if(!(await confirmDelete('Hapus data perlengkapan ini?'))) return;
          try{ await api.deletePerlengkapan(p.id); renderPerlengkapanTab(); }catch(err){ alert('Gagal menghapus: '+terjemahkanErrorDb(err)); }
        });
      });
    }
    function renderRowsResetPage(){ pageState.shown = pageState.step; renderRows(); }
    document.getElementById('fp-search').addEventListener('input', debounce(renderRowsResetPage, 300));
    ['fp-jenis','fp-kondisi'].forEach(id=>document.getElementById(id).addEventListener('input', renderRowsResetPage));
    document.getElementById('fp-reset').addEventListener('click', ()=>{
      document.getElementById('fp-search').value=''; document.getElementById('fp-jenis').value=''; document.getElementById('fp-kondisi').value='';
      renderRowsResetPage();
    });
    document.getElementById('perlengkapan-tbody').closest('table').querySelectorAll('thead th[data-sort-key]').forEach(th=>{
      wireSortableHeader(th, sortState, renderRows);
    });
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-perlengkapan').addEventListener('click', ()=>openPerlengkapanFormModal(ruas, null, renderPerlengkapanTab)); }
  }catch(err){ box.innerHTML = errorPanel(err); }
}

const AUDIT_AKSI_LABEL = {insert:'Tambah', update:'Ubah', delete:'Hapus'};
const AUDIT_TABEL_LABEL = {survei_kondisi:'Survei Kondisi', anggaran_tahunan:'Anggaran Tahunan', penanganan:'Kegiatan Penanganan'};
// Pengembangan #8: label nama field yang dikenal, dialihkan ke Bahasa Indonesia
// yang mudah dibaca. Field yang tidak terdaftar tetap ditampilkan otomatis
// (underscore jadi spasi + kapital tiap kata) supaya tetap terbaca meski
// daftar ini belum lengkap.
const AUDIT_FIELD_LABEL = {
  ruas_id:'Ruas Jalan', segmen_id:'Segmen', kabupaten_id:'Kabupaten/Kota',
  tanggal_survei:'Tanggal Survei', kondisi:'Kondisi', kondisi_hasil:'Kondisi Hasil', nilai_iri:'Nilai IRI',
  nilai_pci:'Nilai PCI', nilai_sdi:'Nilai SDI', nilai_ikp:'Nilai IKP',
  jenis_kerusakan:'Jenis Kerusakan', metode_survei:'Metode Survei', surveyor:'Surveyor', catatan:'Catatan',
  jenis_penanganan:'Jenis Penanganan', tahun_anggaran:'Tahun Anggaran', tahun:'Tahun',
  tanggal_mulai:'Tanggal Mulai', tanggal_penanganan:'Tanggal Mulai', tanggal_selesai:'Tanggal Selesai',
  volume_panjang_m:'Volume Panjang (m)', volume_luas_m2:'Volume Luas (m²)', tebal_lapisan_cm:'Tebal Lapisan (cm)',
  sumber_dana:'Sumber Dana', status_pekerjaan:'Status Pekerjaan', kontraktor_id:'Kontraktor',
  kontraktor_pelaksana:'Kontraktor Pelaksana', deskripsi:'Deskripsi', as_built_url:'Tautan As-Built',
  kategori_ruang:'Kategori Ruang', sub_kegiatan:'Sub Kegiatan', sta_awal:'STA Awal', sta_akhir:'STA Akhir',
  volume:'Volume', satuan:'Satuan', biaya:'Biaya', link_dokumentasi:'Link Dokumentasi',
  foto_awal_path:'Foto Awal', foto_akhir_path:'Foto Akhir', kejadian_bencana_id:'Kejadian Bencana',
  rekomendasi:'Rekomendasi', pagu:'Pagu', realisasi:'Realisasi',
};
function labelFieldAudit(k){ return AUDIT_FIELD_LABEL[k] || k.replaceAll('_',' ').replace(/\b\w/g, c=>c.toUpperCase()); }
function formatNilaiAudit(k, v){
  if(v===null || v===undefined || v==='') return '—';
  if(['pagu','realisasi','biaya'].includes(k)) return fmtRp(v);
  if(k.startsWith('tanggal_')) return fmtDate(v);
  if((k==='kondisi'||k==='kondisi_hasil') && KONDISI_LABEL[v]) return KONDISI_LABEL[v];
  if(Array.isArray(v)) return v.length? v.join(', ') : '—';
  if(typeof v === 'string' && v.includes('_')) return v.replaceAll('_',' ');
  return String(v);
}
// daftarPerubahan(): daftar LENGKAP field yang berubah (dipakai modal detail).
function daftarPerubahan(lama, baru){
  const keys = new Set([...Object.keys(lama||{}), ...Object.keys(baru||{})]);
  const skip = new Set(['id','created_at','updated_at','created_by']);
  const perubahan = [];
  keys.forEach(k=>{
    if(skip.has(k)) return;
    const a = lama?.[k], b = baru?.[k];
    if(JSON.stringify(a) !== JSON.stringify(b)) perubahan.push({ field:k, label:labelFieldAudit(k), dari:formatNilaiAudit(k,a), ke:formatNilaiAudit(k,b) });
  });
  return perubahan;
}
// ringkasPerubahan(): versi singkat untuk kolom tabel (dipotong beberapa item pertama).
function ringkasPerubahan(lama, baru){
  if(!lama) return 'Data baru ditambahkan.';
  if(!baru) return 'Data dihapus.';
  const perubahan = daftarPerubahan(lama, baru);
  if(!perubahan.length) return 'Tidak ada perubahan nilai.';
  return perubahan.slice(0,3).map(p=>`${p.label}: ${p.dari} → ${p.ke}`).join(' · ') + (perubahan.length>3? ` … (+${perubahan.length-3} lainnya)` : '');
}
// openAuditDetailModal(): tampilan ringkas "field apa berubah, dari → ke" secara
// LENGKAP (tidak dipotong), menggantikan JSON mentah data_lama/data_baru.
function openAuditDetailModal(log){
  const judul = `${AUDIT_TABEL_LABEL[log.tabel]||log.tabel} · ${AUDIT_AKSI_LABEL[log.aksi]||log.aksi}`;
  const subjudul = `${new Date(log.created_at).toLocaleString('id-ID')} · oleh ${log.actor_nama||'Sistem'}`;
  let isi;
  if(!log.data_lama){
    isi = `<p class="text-[13.5px] text-ink-600">Data baru ditambahkan dengan seluruh isian sebagaimana tercatat saat ini.</p>`;
  } else if(!log.data_baru){
    isi = `<p class="text-[13.5px] text-ink-600">Seluruh data ini dihapus dari sistem.</p>`;
  } else {
    const perubahan = daftarPerubahan(log.data_lama, log.data_baru);
    isi = perubahan.length
      ? `<div class="max-h-[55vh] overflow-y-auto -mx-1 px-1"><table><thead><tr><th>Field</th><th>Nilai Lama</th><th>Nilai Baru</th></tr></thead><tbody>
          ${perubahan.map(p=>`<tr><td class="font-medium text-[12.5px] whitespace-nowrap">${p.label}</td><td class="text-[12.5px] text-ink-500">${p.dari}</td><td class="text-[12.5px]">${p.ke}</td></tr>`).join('')}
        </tbody></table></div>`
      : `<p class="text-[13.5px] text-ink-500">Tidak ada perubahan nilai (mis. hanya menyimpan ulang data yang sama).</p>`;
  }
  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>

    ${isi}
  `);
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.closeModal());
}
// --- Usulan #7: sortir kolom tabel dengan klik header (murni logika di
// browser, tidak menyentuh query database). Setiap tabel yang mengaktifkan
// ini punya objek sortState {key, dir} sendiri per-view, dan setiap kolom
// yang bisa disortir diberi atribut data-sort-key pada elemen <th>-nya. -----
function wireSortableHeader(th, sortState, onChange){
  th.classList.add('th-sortable');
  th.addEventListener('click', ()=>{
    const key = th.dataset.sortKey;
    if(sortState.key===key){ sortState.dir = sortState.dir==='asc' ? 'desc' : 'asc'; }
    else { sortState.key = key; sortState.dir = 'asc'; }
    refreshSortIndicators(th.parentElement, sortState);
    onChange();
  });
}
function refreshSortIndicators(theadRow, sortState){
  theadRow.querySelectorAll('th[data-sort-key]').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.sortKey===sortState.key) th.classList.add(sortState.dir==='desc'?'sort-desc':'sort-asc');
  });
}
function applySort(rows, sortState, getters){
  if(!sortState.key || !getters[sortState.key]) return rows;
  const get = getters[sortState.key];
  const sorted = [...rows].sort((a,b)=>{
    let va = get(a), vb = get(b);
    if(va==null && vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    if(typeof va==='string') va = va.toLowerCase();
    if(typeof vb==='string') vb = vb.toLowerCase();
    if(va<vb) return -1;
    if(va>vb) return 1;
    return 0;
  });
  if(sortState.dir==='desc') sorted.reverse();
  return sorted;
}
// --- Usulan #10: "Muat Lebih Banyak" untuk tabel besar. Seluruh data tetap
// dimuat & difilter/disortir seperti biasa di sisi browser; hanya jumlah
// baris yang dirender sekaligus yang dibatasi (pageState.shown), supaya
// tabel tetap ringan walau datanya terus bertambah. --------------------
function renderLoadMoreBtn(containerEl, totalRows, pageState, onMore){
  const sisa = totalRows - pageState.shown;
  if(sisa <= 0){ containerEl.innerHTML = ''; return; }
  containerEl.innerHTML = `<button type="button" class="btn-loadmore">Muat Lebih Banyak (${fmtNum(sisa)} lagi)</button>`;
  containerEl.querySelector('button').addEventListener('click', ()=>{
    pageState.shown += pageState.step;
    onMore();
  });
}
function debounce(fn, wait=350){
  let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
}

    filter.tabel=''; filter.aksi=''; filter.actorNama=''; filter.dari=''; filter.sampai='';
    namaInput.value=''; document.getElementById('f-audit-tabel').value=''; document.getElementById('f-audit-aksi').value='';
    document.getElementById('f-audit-dari').value=''; document.getElementById('f-audit-sampai').value='';
    loadAndRender();
  });

  loadAndRender();
}

// --- 14. VIEW: ADMIN (Pengguna) -------------------------------------------
async function viewAdmin(){
  const v = document.getElementById('view');
  if(!isAdmin()){ v.innerHTML = `<div class="card p-8 text-center text-ink-400">Halaman ini khusus administrator.</div>`; return; }
  v.innerHTML = skeletonTable(4);
  try{
    const profiles = await api.profiles();
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Manajemen Pengguna</h1>
    <p class="text-ink-500 text-[13.5px]">Kelola peran akses seluruh pengguna sistem</p></div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Nama</th><th>NIP</th><th>Wilayah</th><th>Peran</th></tr></thead>
      <tbody>${profiles.map(p=>`
        <tr><td class="font-medium">${p.nama}${p.id===state.user.id?' <span class="text-[11px] text-ink-400">(Anda)</span>':''}</td>
        <td class="font-mono text-[12.5px] text-ink-500">${p.nip||'—'}</td>
        <td class="text-ink-500">${p.kabupaten?.nama||'Seluruh Provinsi'}</td>
        <td><select data-id="${p.id}" class="role-select max-w-[180px]" ${p.id===state.user.id?'disabled':''}>
          ${Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select></td></tr>`).join('')}
      </tbody></table>
    </div>`;
    v.querySelectorAll('.role-select').forEach(sel=>sel.addEventListener('change', async ()=>{
      try{ await api.updateRole(sel.dataset.id, sel.value); }
      catch(err){ alert('Gagal memperbarui peran: '+terjemahkanErrorDb(err)); }
    }));
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 15. BOOTSTRAP ----------------------------------------------------------
function render(){
  if(!state.user){ renderLogin(); } else { renderShell(); }
}
initAuth();
</script>
