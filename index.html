// Pasangkan <select> yang punya opsi "Lainnya" dengan <input> teks di sebelahnya,
// supaya saat opsi "Lainnya" dipilih, user langsung mengetik nilainya di situ
// (tanpa popup prompt()). getValue() mengembalikan teks ketikan jika "Lainnya"
// dipilih, atau nilai select biasa jika bukan.
function wireLainnyaOption(selectEl, inputEl, {sentinel='lainnya', known=[], current=null} = {}){
  function sync(){
    const isCustom = selectEl.value === sentinel;
    inputEl.classList.toggle('hidden', !isCustom);
    if(isCustom){ inputEl.setAttribute('required',''); if(document.body.contains(inputEl)) inputEl.focus(); }
    else { inputEl.removeAttribute('required'); inputEl.value=''; }
  }
  selectEl.onchange = sync;
  if(current && !known.includes(current)){
    selectEl.value = sentinel;
    inputEl.value = current;
  }
  sync();
  return ()=> selectEl.value===sentinel ? (inputEl.value.trim() || sentinel) : selectEl.value;
}

// Ambil koordinat GPS perangkat saat ini lalu isikan ke pasangan input lat/long.
// Dipakai pada form Ruas Jalan (Titik Awal / Titik Akhir).
function wireGpsButton(btnEl, latInput, longInput, statusEl){
  btnEl.addEventListener('click', ()=>{
    if(!navigator.geolocation){ statusEl.textContent = 'Perangkat/browser ini tidak mendukung GPS.'; statusEl.classList.remove('hidden'); return; }
    btnEl.disabled = true; const origLabel = btnEl.innerHTML;
    btnEl.innerHTML = 'Mengambil lokasi…';
    statusEl.classList.add('hidden');
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        latInput.value = pos.coords.latitude.toFixed(6);
        longInput.value = pos.coords.longitude.toFixed(6);
        statusEl.textContent = `Akurasi ±${Math.round(pos.coords.accuracy)} m`;
        statusEl.classList.remove('hidden');
        btnEl.disabled = false; btnEl.innerHTML = origLabel;
      },
      (err)=>{
        statusEl.textContent = 'Gagal mengambil lokasi: ' + (err.message||'izin lokasi ditolak.');
        statusEl.classList.remove('hidden');
        btnEl.disabled = false; btnEl.innerHTML = origLabel;
      },
      { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
  });
}

// --- FOTO DOKUMENTASI (Supabase Storage bucket privat 'dokumentasi-jalan') ---
const FOTO_BUCKET = 'dokumentasi-jalan';
async function uploadFotoKegiatan(file, ruasId, label, folder='penanganan'){
  if(!file) return null;
  const ext = (file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `${folder}/${ruasId||'umum'}/${Date.now()}_${label}.${ext}`;
  const contentType = file.type && file.type.startsWith('image/') ? file.type : (ext==='png'?'image/png':ext==='webp'?'image/webp':ext==='gif'?'image/gif':'image/jpeg');
  const {error} = await sb.storage.from(FOTO_BUCKET).upload(path, file, {upsert:false, cacheControl:'3600', contentType});
  if(error) throw error;
  return path;
}
async function signedFotoUrls(paths){
  const uniq = [...new Set((paths||[]).filter(Boolean))];
  if(!uniq.length) return {};
  try{
    const {data, error} = await sb.storage.from(FOTO_BUCKET).createSignedUrls(uniq, 3600);
    if(error) throw error;
    const map = {};
    (data||[]).forEach(d=>{
      if(d.signedUrl) map[d.path] = d.signedUrl;
      else console.error('[foto] gagal buat signed URL untuk path:', d.path, d.error);
    });
    return map;
  }catch(e){ console.error('[foto] createSignedUrls error:', e); return {}; }
}
function fotoThumbHtml(path, cls='w-10 h-10'){
  if(!path) return `<div class="${cls} rounded-lg bg-[#EEF1F6] flex items-center justify-center text-ink-400 shrink-0">${icon('image','w-4 h-4')}</div>`;
  return `<div class="relative ${cls} shrink-0 rounded-lg overflow-hidden bg-[#EEF1F6]">
    <div class="${cls} absolute inset-0 flex items-center justify-center text-ink-400" data-foto-placeholder>${icon('image','w-4 h-4')}</div>
    <img data-foto-path="${path}" class="${cls} rounded-lg object-cover absolute inset-0 opacity-0" alt="Foto dokumentasi">
  </div>`;
}
async function hydrateFotoThumbs(container){
  const imgs = [...container.querySelectorAll('img[data-foto-path]')];
  if(!imgs.length) return;
  const map = await signedFotoUrls(imgs.map(i=>i.dataset.fotoPath));
  imgs.forEach(img=>{
    const url = map[img.dataset.fotoPath];
    if(!url){ console.error('[foto] tidak ada signed URL untuk path:', img.dataset.fotoPath); return; }
    img.addEventListener('load', ()=>{
      img.classList.remove('opacity-0');
      const ph = img.parentElement?.querySelector('[data-foto-placeholder]');
      if(ph) ph.remove();
    });
    img.addEventListener('error', (e)=>{ console.error('[foto] gagal memuat gambar dari signed URL:', url); });
    img.src = url;
  });
}
// Preview file gambar yang baru dipilih user di <input type=file> ke elemen <img>.
function wirePhotoPreview(inputEl, imgEl, placeholderEl){
  inputEl.addEventListener('change', ()=>{
    const f = inputEl.files?.[0];
    if(!f){ return; }
    const url = URL.createObjectURL(f);
    imgEl.src = url; imgEl.classList.remove('hidden');
    if(placeholderEl) placeholderEl.classList.add('hidden');
  });
}

// --- 3. PARSER WKB HEX -> GEOJSON (ringan, tanpa dependensi) --------------
function wkbHexToLatLngs(hex){
  if(!hex) return null;
  try{
    const bytes = new Uint8Array(hex.match(/../g).map(b=>parseInt(b,16)));
    let off = 0;
    const little = bytes[off] === 1; off += 1;
    const readU32 = () => { const v = little ? new DataView(bytes.buffer).getUint32(off,true) : new DataView(bytes.buffer).getUint32(off,false); off+=4; return v; };
    const readF64 = () => { const v = little ? new DataView(bytes.buffer).getFloat64(off,true) : new DataView(bytes.buffer).getFloat64(off,false); off+=8; return v; };
    let type = readU32();
    if(type & 0x20000000){ readU32(); type = type & ~0x20000000; }
    type = type & 0xff;
    if(type === 1){ const x=readF64(), y=readF64(); return {type:'Point', coords:[y,x]}; }
    if(type === 2){ const n=readU32(); const pts=[]; for(let i=0;i<n;i++){ const x=readF64(), y=readF64(); pts.push([y,x]); } return {type:'LineString', coords:pts}; }
    return null;
  }catch(e){ return null; }
}

// --- 5. AUTH ---------------------------------------------------------------
async function loadProfile(userId){
  const {data,error} = await sb.from('profiles').select('*').eq('id',userId).single();
  if(error){ console.warn(error); return null; }
  return data;
}
async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){ state.user = session.user; state.profile = await loadProfile(session.user.id); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if(event === 'SIGNED_IN'){ state.user = session.user; state.profile = await loadProfile(session.user.id); render(); }
    if(event === 'SIGNED_OUT'){ state.user = null; state.profile = null; render(); }
  });
  render();
}

function actionBtns({onEdit, onDelete, onDetail}={}){
  let html = '<div class="flex items-center gap-1.5" onclick="event.stopPropagation()">';
  if(onDetail) html += `<button data-act="detail" class="p-1.5 rounded-md hover:bg-[#EEF1F6] text-navy-700" title="Detail">${icon('doc','w-4 h-4')}</button>`;
  if(onEdit) html += `<button data-act="edit" class="p-1.5 rounded-md hover:bg-[#EEF1F6] text-navy-700" title="Ubah">${icon('edit','w-4 h-4')}</button>`;
  if(onDelete) html += `<button data-act="delete" class="p-1.5 rounded-md hover:bg-[#FBE4E4] text-[var(--bad)]" title="Hapus">${icon('trash','w-4 h-4')}</button>`;
  html += '</div>';
  return html;
}
async function confirmDelete(msg){ return window.confirm(msg || 'Yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.'); }
function icon(name, cls='w-5 h-5'){ return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`; }

// --- 8. VIEW: DASHBOARD -----------------------------------------------------
async function viewDashboard(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="space-y-6">
    <div class="skel h-24 w-full"></div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">${Array(4).fill('<div class="skel h-24"></div>').join('')}</div>
    <div class="grid lg:grid-cols-2 gap-5"><div class="skel h-80"></div><div class="skel h-80"></div></div>
  </div>`;
  try{
    const [ruas, kabupaten, rekapKondisi, rekapAnggaran] = await Promise.all([
      api.ruasList(), api.kabupaten(), api.rekapKondisiKabupaten(), api.rekapAnggaran()
    ]);
    state.ruasCache = ruas; state.kabupatenList = kabupaten;

    const totalKm = ruas.reduce((s,r)=>s+(Number(r.panjang_km)||0),0);
    const kondisiTotals = {baik:0,sedang:0,rusak_ringan:0,rusak_berat:0};
    rekapKondisi.forEach(r=>{ kondisiTotals[r.kondisi] = (kondisiTotals[r.kondisi]||0) + Number(r.total_panjang_km||0); });
    const kondisiSum = Object.values(kondisiTotals).reduce((a,b)=>a+b,0) || 1;
    const thisYear = new Date().getFullYear();
    const anggaranNow = rekapAnggaran.filter(a=>a.tahun===thisYear);
    const pagu = anggaranNow.reduce((s,a)=>s+Number(a.total_pagu||0),0);
    const realisasi = anggaranNow.reduce((s,a)=>s+Number(a.total_realisasi||0),0);

    v.innerHTML = `
    <div class="mb-7">
      <div class="flex items-center justify-between flex-wrap gap-3 mb-3">
        <div>
          <h1 class="font-display font-extrabold text-2xl text-ink-900">Ringkasan Jaringan Jalan</h1>
          <p class="text-ink-500 text-[13.5px]">Kondisi terkini seluruh ruas jalan Provinsi Nusa Tenggara Timur</p>
        </div>
        <span class="font-mono text-[11px] text-ink-400">Diperbarui ${new Date().toLocaleString('id-ID')}</span>
      </div>
      <div class="card p-5">
        <div class="flex justify-between items-baseline mb-2.5">
          <span class="text-[12.5px] font-semibold text-ink-600">Distribusi Kondisi Jalan (% panjang ruas)</span>
          <span class="font-mono text-[11px] text-ink-400">${fmtNum(kondisiSum,1)} km tersurvei</span>
        </div>
        <div class="roadruler">
          <div class="lane"></div>
          ${(()=>{ let left=0; return KONDISI_ORDER.slice().reverse().map(k=>{ const pct = kondisiTotals[k]/kondisiSum*100; const html = pct>0 ? `<div class="seg" style="left:${left}%;width:${pct}%;background:${KONDISI_COLOR[k]}"></div>` : ''; left+=pct; return html; }).join(''); })()}
        </div>
        <div class="flex flex-wrap gap-4 mt-3">
          ${KONDISI_ORDER.map(k=>`<div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:${KONDISI_COLOR[k]}"></span>${KONDISI_LABEL[k]} · ${fmtNum(kondisiTotals[k]/kondisiSum*100,1)}%</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${kpiCard('Total Ruas Jalan', fmtNum(ruas.length), 'road', `${kabupaten.length} kabupaten/kota`)}
      ${kpiCard('Panjang Jaringan', fmtNum(totalKm,1)+' km', 'map', 'Terdaftar dalam sistem')}
      ${kpiCard('Pagu Anggaran '+thisYear, fmtRp(pagu), 'wallet', pagu>0? fmtNum(realisasi/pagu*100,1)+'% terealisasi':'Belum ada data')}
      ${kpiCard('Realisasi '+thisYear, fmtRp(realisasi), 'wallet', 'Dari seluruh sumber dana')}
    </div>

    <div class="grid lg:grid-cols-2 gap-5">
      <div class="card p-5">
        <h3 class="font-display font-bold text-[15px] mb-4">Kondisi Jalan per Kabupaten/Kota</h3>
        <div style="height:320px"><canvas id="chart-kondisi"></canvas></div>
      </div>
      <div class="card p-5">
        <h3 class="font-display font-bold text-[15px] mb-4">Realisasi Anggaran per Tahun</h3>
        <div style="height:320px"><canvas id="chart-anggaran"></canvas></div>
      </div>
    </div>`;

    // Chart: kondisi per kabupaten (stacked bar)
    const kabNames = [...new Set(rekapKondisi.map(r=>r.kabupaten))].sort();
    const dsKondisi = KONDISI_ORDER.map(k=>({
      label: KONDISI_LABEL[k], backgroundColor: KONDISI_COLOR[k],
      data: kabNames.map(kb => { const row = rekapKondisi.find(r=>r.kabupaten===kb && r.kondisi===k); return row? Number(row.total_panjang_km) : 0; })
    }));
    mkChart('chart-kondisi', 'bar', {labels:kabNames, datasets:dsKondisi}, {
      plugins:{legend:{display:false}}, scales:{x:{stacked:true, ticks:{font:{size:10}}}, y:{stacked:true, title:{display:true,text:'km'}}}
    });

    // Chart: anggaran per tahun (grouped bar pagu vs realisasi)
    const tahunList = [...new Set(rekapAnggaran.map(r=>r.tahun))].sort();
    const paguPerTahun = tahunList.map(t => rekapAnggaran.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_pagu||0),0));
    const realPerTahun = tahunList.map(t => rekapAnggaran.filter(r=>r.tahun===t).reduce((s,r)=>s+Number(r.total_realisasi||0),0));
    mkChart('chart-anggaran','bar',{labels:tahunList, datasets:[
      {label:'Pagu', backgroundColor:'#16385E', data:paguPerTahun, borderRadius:4},
      {label:'Realisasi', backgroundColor:'#F2A93B', data:realPerTahun, borderRadius:4},
    ]}, {scales:{y:{ticks:{callback:v=>fmtRp(v)}}}});

    if(rekapKondisi.length===0 && rekapAnggaran.length===0){
      v.insertAdjacentHTML('beforeend', emptyStateNotice());
    }
  }catch(err){ v.innerHTML = errorPanel(err); }
}
function kpiCard(label, value, iconName, sub){
  return `<div class="card p-4">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[11.5px] font-semibold text-ink-500 uppercase tracking-wide">${label}</span>
      <span class="text-navy-700">${icon(iconName,'w-4 h-4')}</span>
    </div>
    <div class="font-display font-extrabold text-[22px] text-ink-900">${value}</div>
    <div class="text-[11.5px] text-ink-400 mt-0.5">${sub}</div>
  </div>`;
}
function mkChart(canvasId, type, data, extraOptions={}){
  if(state.charts[canvasId]) state.charts[canvasId].destroy();
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  state.charts[canvasId] = new Chart(ctx, {type, data, options: Object.assign({responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}}}, extraOptions)});
}
function emptyStateNotice(){
  return `<div class="card p-5 mt-5 flex items-start gap-3 border-dashed">
    <span class="text-accent-dark mt-0.5">${icon('alert','w-5 h-5')}</span>
    <div><div class="font-semibold text-[13.5px]">Data survei &amp; anggaran belum lengkap</div>
    <p class="text-[13px] text-ink-500 mt-0.5">Grafik akan terisi otomatis setelah data survei kondisi dan anggaran tahunan mulai diinput oleh petugas.</p></div>
  </div>`;
}
function errorPanel(err){
  return `<div class="card p-6 border-[var(--bad)]"><div class="font-semibold text-[var(--bad)] mb-1">Gagal memuat data</div><p class="text-[13px] text-ink-500 font-mono">${(err&&err.message)||err}</p></div>`;
}

// --- 9. VIEW: PETA -----------------------------------------------------------
async function viewPeta(){
  const v = document.getElementById('view');
  v.innerHTML = `
  <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Peta Jaringan Jalan</h1>
  <p class="text-ink-500 text-[13.5px]">Sebaran ruas jalan, diwarnai berdasarkan kondisi terkini</p></div>
  <div class="card p-3">
    <div id="map" style="height:560px;"></div>
  </div>
  <div class="flex flex-wrap gap-4 mt-3">
    ${KONDISI_ORDER.map(k=>`<div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:${KONDISI_COLOR[k]}"></span>${KONDISI_LABEL[k]}</div>`).join('')}
    <div class="flex items-center gap-1.5 text-[12px] text-ink-600"><span class="w-2.5 h-2.5 rounded-full" style="background:#8896AC"></span>Belum disurvei</div>
  </div>
  <div id="map-empty" class="hidden mt-4">${emptyStateMap()}</div>`;

  if(state.map){ state.map.remove(); state.map = null; }
  const map = L.map('map', {scrollWheelZoom:true}).setView([-9.6, 121.0], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap contributors', maxZoom:18}).addTo(map);
  state.map = map;
  const layerGroup = L.layerGroup().addTo(map);

  try{
    const [ruas, kondisi] = await Promise.all([api.ruasList(), api.kondisiTerkini()]);
    // worst kondisi per ruas
    const worstByRuas = {};
    kondisi.forEach(row=>{
      const cur = worstByRuas[row.ruas_id];
      if(!cur || KONDISI_ORDER.indexOf(row.kondisi) < KONDISI_ORDER.indexOf(cur)) worstByRuas[row.ruas_id] = row.kondisi;
    });
    let drawn = 0;
    const bounds = [];
    ruas.forEach(r=>{
      const parsed = wkbHexToLatLngs(r.geom);
      if(!parsed) return;
      const kondisi = worstByRuas[r.id];
      const color = kondisi ? KONDISI_COLOR[kondisi] : '#8896AC';
      let layer;
      if(parsed.type === 'LineString'){ layer = L.polyline(parsed.coords, {color, weight:5, opacity:.85}); parsed.coords.forEach(c=>bounds.push(c)); }
      else { layer = L.circleMarker(parsed.coords, {radius:7, color, fillColor:color, fillOpacity:.9}); bounds.push(parsed.coords); }
      layer.bindPopup(`<b class="font-mono">${r.kode_ruas}</b><br>${r.nama_ruas}<br><span style="color:${color}">${kondisi?KONDISI_LABEL[kondisi]:'Belum disurvei'}</span> · ${fmtNum(r.panjang_km,1)} km`);
      layer.on('click', ()=>{ state.selectedRuasId = r.id; state.route='ruas'; renderShell(); });
      layer.addTo(layerGroup);
      drawn++;
    });
    if(drawn > 0 && bounds.length){ map.fitBounds(bounds, {padding:[30,30]}); }
    else { document.getElementById('map-empty').classList.remove('hidden'); }
  }catch(err){ v.insertAdjacentHTML('beforeend', errorPanel(err)); }
}

async function viewRuas(){
  const v = document.getElementById('view');
  if(state.selectedRuasId){ return viewRuasDetail(state.selectedRuasId); }
  v.innerHTML = `<div class="skel h-10 w-full mb-4"></div><div class="skel h-96 w-full"></div>`;
  try{
    const [ruas, kabupaten, kondisi] = await Promise.all([api.ruasList(), api.kabupaten(), api.kondisiTerkini()]);
    state.ruasCache = ruas; state.kabupatenList = kabupaten;
    const worstByRuas = {};
    kondisi.forEach(row=>{ const cur = worstByRuas[row.ruas_id]; if(!cur || KONDISI_ORDER.indexOf(row.kondisi) < KONDISI_ORDER.indexOf(cur)) worstByRuas[row.ruas_id] = row.kondisi; });

    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Daftar Ruas Jalan</h1>
      <p class="text-ink-500 text-[13.5px]">${ruas.length} ruas terdaftar</p></div>
      ${isEditor()?`<button id="btn-add-ruas" class="btn-accent">+ Tambah Ruas</button>`:''}
    </div>
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="f-search" placeholder="Cari kode / nama ruas…" class="max-w-xs">
      <select id="f-kabupaten" class="max-w-[220px]"><option value="">Semua Kabupaten/Kota</option>${kabupaten.map(k=>`<option value="${k.id}">${k.nama}</option>`).join('')}</select>
      <select id="f-status" class="max-w-[180px]"><option value="">Semua Status</option><option value="nasional">Nasional</option><option value="provinsi">Provinsi</option><option value="kabupaten">Kabupaten</option></select>
      <select id="f-kondisi" class="max-w-[180px]"><option value="">Semua Kondisi</option>${KONDISI_ORDER.map(k=>`<option value="${k}">${KONDISI_LABEL[k]}</option>`).join('')}</select>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Kode</th><th>Nama Ruas</th><th>Kab/Kota</th><th>Status</th><th>Panjang</th><th>Lebar</th><th>Kondisi</th>${isEditor()?'<th>Aksi</th>':''}</tr></thead>
      <tbody id="ruas-tbody"></tbody></table>
    </div>
    <div id="ruas-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Tidak ada ruas yang cocok dengan filter.</div>`;

    function renderRows(){
      const q = document.getElementById('f-search').value.toLowerCase();
      const kab = document.getElementById('f-kabupaten').value;
      const st = document.getElementById('f-status').value;
      const kd = document.getElementById('f-kondisi').value;
      const rows = ruas.filter(r=>{
        if(q && !(r.kode_ruas?.toLowerCase().includes(q) || r.nama_ruas?.toLowerCase().includes(q))) return false;
        if(kab && r.kabupaten_id !== kab) return false;
        if(st && r.status_jalan !== st) return false;
        if(kd && worstByRuas[r.id] !== kd) return false;
        return true;
      });
      const tbody = document.getElementById('ruas-tbody');
      tbody.innerHTML = rows.map(r=>`
        <tr class="row-hover" data-id="${r.id}">
          <td class="font-mono text-[12.5px] text-navy-700 font-semibold">${r.kode_ruas}</td>
          <td class="font-medium">${r.nama_ruas}</td>
          <td class="text-ink-500">${r.kabupaten?.nama || '—'}</td>
          <td class="capitalize text-ink-500">${r.status_jalan||'—'}</td>
          <td class="font-mono">${fmtNum(r.panjang_km,1)} km</td>
          <td class="font-mono">${r.lebar_jalan_m!=null? fmtNum(r.lebar_jalan_m,1)+' m' : '—'}</td>
          <td>${badge(worstByRuas[r.id])}</td>
          ${isEditor()?`<td>${actionBtns({onEdit:true, onDelete:isAdmin()})}</td>`:''}
        </tr>`).join('');
      document.getElementById('ruas-empty').classList.toggle('hidden', rows.length>0);
      tbody.querySelectorAll('tr').forEach(tr=>{
        tr.addEventListener('click', ()=>{ state.selectedRuasId = tr.dataset.id; renderShell(); });
        tr.querySelector('[data-act="edit"]')?.addEventListener('click', ()=>{
          const r = ruas.find(x=>x.id===tr.dataset.id); openRuasFormModal(kabupaten, r);
        });
        tr.querySelector('[data-act="delete"]')?.addEventListener('click', async ()=>{
          const r = ruas.find(x=>x.id===tr.dataset.id);
          if(!(await confirmDelete(`Hapus ruas "${r.nama_ruas}" beserta seluruh data terkait (segmen, survei, penanganan)?`))) return;
          try{ await api.deleteRuas(r.id); viewRuas(); }catch(err){ alert('Gagal menghapus: '+err.message); }
        });
      });
    }
    ['f-search','f-kabupaten','f-status','f-kondisi'].forEach(id=>document.getElementById(id).addEventListener('input', renderRows));
    renderRows();
    if(isEditor()){ document.getElementById('btn-add-ruas').addEventListener('click', ()=>openRuasFormModal(kabupaten)); }
  }catch(err){ v.innerHTML = errorPanel(err); }
}

// --- 11. MODAL: TAMBAH RUAS -------------------------------------------
function openModal(innerHtml){
  const overlay = el(`<div class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4"></div>`);
  overlay.innerHTML = `<div class="card w-full max-w-lg max-h-[88vh] overflow-y-auto p-6 relative">${innerHtml}</div>`;
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  return overlay;
}

      long_akhir: overlay.querySelector('#rj-long-akhir').value || null,
      keterangan: overlay.querySelector('#rj-ket').value || null,
    };
    try{
      if(isEdit){ await api.updateRuas(editData.id, payload); }
      else{ payload.created_by = state.user.id; await api.insertRuas(payload); }
      overlay.remove();
      if(isEdit && state.selectedRuasId===editData.id){ viewRuasDetail(editData.id); } else { viewRuas(); }

function openSurveiFormModal(ruas, segmenList, editData=null, onSaved=null){

    <form id="form-survei" class="space-y-3">
      <div><label class="text-[12.5px] font-semibold text-ink-600">Segmen *</label>
        <select id="sv-segmen" required>${segmenList.length? segmenList.map(s=>`<option value="${s.id}" ${currentSegId===s.id?'selected':''}>${s.kode_segmen||'Segmen'} (STA ${fmtNum(s.sta_awal,3)}–${fmtNum(s.sta_akhir,3)})</option>`).join('') : `<option value="">Belum ada segmen</option>`}</select></div>

        <div><label class="text-[12.5px] font-semibold text-ink-600">Kondisi *</label><select id="sv-kondisi" required>${KONDISI_ORDER.map(k=>`<option value="${k}" ${editData?.kondisi===k?'selected':''}>${KONDISI_LABEL[k]}</option>`).join('')}</select></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-[12.5px] font-semibold text-ink-600">Nilai IRI</label><input id="sv-iri" type="number" step="0.01" min="0" value="${editData?.nilai_iri??''}"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Metode Survei</label><select id="sv-metode">
          <option value="visual" ${!editData||editData?.metode_survei==='visual'?'selected':''}>Visual</option>
          <option value="alat_ukur" ${editData?.metode_survei==='alat_ukur'?'selected':''}>Alat Ukur</option>

      </div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Catatan</label><textarea id="sv-catatan" rows="2">${editData?.catatan||''}</textarea></div>
      <div>
        <label class="text-[12.5px] font-semibold text-ink-600">Foto Kondisi</label>
        <div class="flex items-center gap-2 mt-1">
          <div class="relative w-14 h-14 shrink-0">
            <div id="sv-foto-ph" class="w-14 h-14 rounded-lg bg-[#EEF1F6] flex items-center justify-center text-ink-400 ${editData?.foto_path?'hidden':''}">${icon('camera','w-5 h-5')}</div>
            <img id="sv-foto-preview" data-foto-path="${editData?.foto_path||''}" class="w-14 h-14 rounded-lg object-cover ${editData?.foto_path?'':'hidden'}" src="" alt="Foto kondisi jalan">
          </div>

      <button type="submit" class="btn-primary w-full" ${segmenList.length?'':'disabled'}>${isEdit?'Simpan Perubahan':'Simpan Survei'}</button>

  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());
  const getMetodeSurvei = wireLainnyaOption(overlay.querySelector('#sv-metode'), overlay.querySelector('#sv-metode-lainnya'), {known:['visual','alat_ukur','drone'], current: editData?.metode_survei});
  wirePhotoPreview(overlay.querySelector('#sv-foto'), overlay.querySelector('#sv-foto-preview'), overlay.querySelector('#sv-foto-ph'));
  hydrateFotoThumbs(overlay);
  overlay.querySelector('#form-survei').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#sv-err');
    errBox.classList.add('hidden');
    const submitBtn = overlay.querySelector('button[type="submit"]');
    const fileFoto = overlay.querySelector('#sv-foto').files?.[0] || null;
    submitBtn.disabled = true; const submitLabel = submitBtn.textContent;
    try{
      if(fileFoto){ submitBtn.textContent = 'Mengunggah foto…'; }
      const fotoPath = fileFoto
        ? await uploadFotoKegiatan(fileFoto, ruas.id, 'kondisi', 'survei')
        : (editData?.foto_path || null);
      submitBtn.textContent = submitLabel;
      const payload = {
        segmen_id: overlay.querySelector('#sv-segmen').value,
        tanggal_survei: overlay.querySelector('#sv-tanggal').value,
        kondisi: overlay.querySelector('#sv-kondisi').value,
        nilai_iri: overlay.querySelector('#sv-iri').value || null,
        metode_survei: getMetodeSurvei(),
        catatan: overlay.querySelector('#sv-catatan').value || null,
        foto_path: fotoPath,
      };
      if(isEdit){ await api.updateSurvei(editData.id, payload); }
      else{ payload.created_by = state.user.id; await api.insertSurvei(payload); }
      overlay.remove();
      if(onSaved) onSaved(); else viewRuasDetail(ruas.id);
    }catch(err){
      submitBtn.textContent = submitLabel;
      errBox.textContent = err.message; errBox.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
    }
  });
}

  toggleBencanaField();

  wirePhotoPreview(overlay.querySelector('#kg-foto-awal'), overlay.querySelector('#kg-foto-awal-preview'), overlay.querySelector('#kg-foto-awal-ph'));
  wirePhotoPreview(overlay.querySelector('#kg-foto-akhir'), overlay.querySelector('#kg-foto-akhir-preview'), overlay.querySelector('#kg-foto-akhir-ph'));
  hydrateFotoThumbs(overlay);

  const getSumberDana = wireLainnyaOption(overlay.querySelector('#kg-sumber'), overlay.querySelector('#kg-sumber-lainnya'), {sentinel:'Lainnya', known:['APBD_Provinsi','APBN','DAK','Hibah'], current: editData?.sumber_dana});
  overlay.querySelector('#form-kegiatan').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const errBox = overlay.querySelector('#kg-err');
    errBox.classList.add('hidden');
    const submitBtn = overlay.querySelector('button[type="submit"]');
    const subKegiatan = getSubKegiatan();
    const tglMulai = overlay.querySelector('#kg-tgl-mulai').value;
    const ruasId = overlay.querySelector('#kg-ruas').value;
    const fileAwal = overlay.querySelector('#kg-foto-awal').files?.[0] || null;
    const fileAkhir = overlay.querySelector('#kg-foto-akhir').files?.[0] || null;
    submitBtn.disabled = true; const submitLabel = submitBtn.textContent;
    try{
      if(fileAwal || fileAkhir){ submitBtn.textContent = 'Mengunggah foto…'; }
      const [fotoAwalPath, fotoAkhirPath] = await Promise.all([
        fileAwal? uploadFotoKegiatan(fileAwal, ruasId, 'awal') : Promise.resolve(editData?.foto_awal_path || null),
        fileAkhir? uploadFotoKegiatan(fileAkhir, ruasId, 'akhir') : Promise.resolve(editData?.foto_akhir_path || null),
      ]);
      submitBtn.textContent = submitLabel;
      const payload = {
        ruas_id: ruasId,
        jenis_penanganan: overlay.querySelector('#kg-jenis').value,
        kategori_ruang: overlay.querySelector('#kg-kategori').value || null,
        sub_kegiatan: subKegiatan || null,
        sta_awal: overlay.querySelector('#kg-sta-awal').value || null,
        sta_akhir: overlay.querySelector('#kg-sta-akhir').value || null,
        foto_awal_path: fotoAwalPath,
        foto_akhir_path: fotoAkhirPath,
        tanggal_mulai: tglMulai || null,
        tanggal_selesai: overlay.querySelector('#kg-tgl-selesai').value || null,
        tahun_anggaran: tglMulai ? new Date(tglMulai).getFullYear() : new Date().getFullYear(),
        status_pekerjaan: overlay.querySelector('#kg-status').value,
        sumber_dana: getSumberDana() || null,
        nilai_pci: overlay.querySelector('#kg-pci').value || null,
        nilai_sdi: overlay.querySelector('#kg-sdi').value || null,
        nilai_ikp: overlay.querySelector('#kg-ikp').value || null,
        kondisi_hasil: overlay.querySelector('#kg-kondisi-hasil').value || null,
        rekomendasi: overlay.querySelector('#kg-rekomendasi').value || null,
        volume: overlay.querySelector('#kg-volume').value || null,
        satuan: overlay.querySelector('#kg-satuan').value || null,
        biaya: overlay.querySelector('#kg-biaya').value || null,
        kontraktor_pelaksana: overlay.querySelector('#kg-kontraktor').value || null,
        link_dokumentasi: overlay.querySelector('#kg-link').value || null,
        deskripsi: overlay.querySelector('#kg-deskripsi').value || null,
        kejadian_bencana_id: overlay.querySelector('#kg-jenis').value === 'tanggap_darurat' ? (overlay.querySelector('#kg-bencana').value || null) : null,
      };
      if(isEdit){ payload.segmen_id = editData?.segmen_id ?? null; }
      if(isEdit){ await api.updatePenanganan(editData.id, payload); }
      else{ payload.created_by = state.user.id; await api.insertPenanganan(payload); }
      overlay.remove();
      if(onSaved) onSaved(); else viewKegiatan();
    }catch(err){
      submitBtn.textContent = submitLabel; submitBtn.disabled = false;
      errBox.textContent = err.message; errBox.classList.remove('hidden');
    }
  });
}

    ${kg.rekomendasi?`<div class="mb-3 text-[13px]"><span class="text-ink-400">Rekomendasi</span><p class="text-ink-600 mt-0.5">${kg.rekomendasi}</p></div>`:''}
    ${kg.keterangan?`<div class="mb-4 text-[13px]"><span class="text-ink-400">Deskripsi</span><p class="text-ink-600 mt-0.5">${kg.keterangan}</p></div>`:''}
    ${(kg.foto_awal_path||kg.foto_akhir_path)? `<div class="mb-4">
      <span class="text-[13px] text-ink-400">Foto Dokumentasi</span>
      <div class="grid grid-cols-2 gap-3 mt-1.5">
        ${kg.foto_awal_path? `<div><div class="text-[11.5px] text-ink-400 mb-1">STA Awal</div>${fotoThumbHtml(kg.foto_awal_path,'w-full h-32')}</div>`:''}
        ${kg.foto_akhir_path? `<div><div class="text-[11.5px] text-ink-400 mb-1">STA Akhir</div>${fotoThumbHtml(kg.foto_akhir_path,'w-full h-32')}</div>`:''}
      </div>
    </div>`:''}
    ${kg.link_dokumentasi?`<div class="mb-4 text-[13px]"><span class="text-ink-400">Link Dokumentasi</span><div class="mt-0.5"><a href="${kg.link_dokumentasi}" target="_blank" class="text-navy-700 underline break-all">${kg.link_dokumentasi}</a></div></div>`:''}

    <div id="dok-matrix" class="text-[13px]"><div class="skel h-32 w-full"></div></div>
  `);
  overlay.querySelector('div.card').classList.add('!max-w-2xl');
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());
  hydrateFotoThumbs(overlay);
  overlay.querySelectorAll('img[data-foto-path]').forEach(img=>{
    img.classList.add('cursor-zoom-in');
    img.addEventListener('click', ()=>{ if(img.src) window.open(img.src, '_blank'); });
  });

  api.dokumenMatrix(kg.id).then(rows=>{
    const box = overlay.querySelector('#dok-matrix');
    if(!rows.length){ box.innerHTML = `<p class="text-ink-400">Belum ada daftar dokumen (kemungkinan trigger otomatis belum berjalan).</p>`; return; }
    const byTahap = {};
    rows.forEach(r=>{ (byTahap[r.tahap_nama] ??= []).push(r); });
    box.innerHTML = Object.entries(byTahap).map(([tahap, docs])=>`
      <div class="mb-3">
        <div class="font-semibold text-ink-700 mb-1.5">${tahap}</div>
        ${docs.map(d=>`
          <div class="flex items-center gap-2 py-1.5 border-b border-line last:border-0" data-dokid="${d.dokumen_id}">
            <button data-toggle class="w-5 h-5 rounded border ${d.status==='sudah'?'bg-[var(--good)] border-[var(--good)] text-white':'border-line'} flex items-center justify-center shrink-0" ${isEditor()?'':'disabled'}>${d.status==='sudah'?icon('check','w-3.5 h-3.5'):''}</button>
            <span class="flex-1 ${d.status==='sudah'?'':'text-ink-500'}">${d.nama_dokumen}${d.wajib?'':' <span class=\"text-ink-400\">(opsional)</span>'}</span>
            ${isEditor()?`<input data-link placeholder="Link dokumen" value="${d.link_dokumen||''}" class="!w-40 !py-1 text-[12px]">`:(d.link_dokumen?`<a href="${d.link_dokumen}" target="_blank" class="text-navy-700 text-[12px] underline">Buka</a>`:'')}
          </div>`).join('')}
      </div>`).join('');
    if(isEditor()){
      box.querySelectorAll('[data-dokid]').forEach(row=>{
        const dokId = row.dataset.dokid;
        const rowData = rows.find(r=>r.dokumen_id===dokId);
        row.querySelector('[data-toggle]').addEventListener('click', async (e)=>{
          const newStatus = rowData.status==='sudah' ? 'belum' : 'sudah';
          try{
            await api.updateDokumen(dokId, {status:newStatus, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id});
            rowData.status = newStatus;
            e.currentTarget.className = `w-5 h-5 rounded border ${newStatus==='sudah'?'bg-[var(--good)] border-[var(--good)] text-white':'border-line'} flex items-center justify-center shrink-0`;
            e.currentTarget.innerHTML = newStatus==='sudah'?icon('check','w-3.5 h-3.5'):'';
          }catch(err){ alert('Gagal memperbarui status dokumen: '+err.message); }
        });
        row.querySelector('[data-link]').addEventListener('change', async (e)=>{
          try{ await api.updateDokumen(dokId, {link_dokumen: e.target.value || null, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id}); }
          catch(err){ alert('Gagal menyimpan link: '+err.message); }
        });
      });
    }
  }).catch(err=>{ overlay.querySelector('#dok-matrix').innerHTML = errorPanel(err); });
}

  const overlay = openModal(`
    <button data-close class="absolute top-4 right-4 text-ink-400 hover:text-ink-900">✕</button>

        <select id="bc-ruas" required><option value="">Pilih ruas…</option>${(ruasList||[]).map(r=>`<option value="${r.id}">${r.kode_ruas} — ${r.nama_ruas}</option>`).join('')}</select></div>

          <select id="bc-jenis" required>
            <option value="longsor" ${editData?.jenis_kejadian==='longsor'?'selected':''}>Longsor</option>
            <option value="banjir" ${editData?.jenis_kejadian==='banjir'?'selected':''}>Banjir</option>
            <option value="abrasi" ${editData?.jenis_kejadian==='abrasi'?'selected':''}>Abrasi</option>
            <option value="gempa" ${editData?.jenis_kejadian==='gempa'?'selected':''}>Gempa</option>
            <option value="angin_kencang" ${editData?.jenis_kejadian==='angin_kencang'?'selected':''}>Angin Kencang</option>
            <option value="lainnya">Lainnya (isi manual)</option>
          </select><input id="bc-jenis-lainnya" class="hidden mt-2" placeholder="Tuliskan jenis kejadian…"></div>
        <div><label class="text-[12.5px] font-semibold text-ink-600">Tanggal Kejadian *</label><input id="bc-tanggal" type="date" required value="${editData?.tanggal_kejadian||''}"></div>
      </div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Tingkat Kerusakan</label>
        <select id="bc-tingkat">
          <option value="">—</option>
          <option value="ringan" ${editData?.tingkat_kerusakan==='ringan'?'selected':''}>Ringan</option>
          <option value="sedang" ${editData?.tingkat_kerusakan==='sedang'?'selected':''}>Sedang</option>
          <option value="berat" ${editData?.tingkat_kerusakan==='berat'?'selected':''}>Berat</option>
          <option value="putus_total" ${editData?.tingkat_kerusakan==='putus_total'?'selected':''}>Putus Total</option>
        </select></div>
      <div><label class="text-[12.5px] font-semibold text-ink-600">Deskripsi</label><textarea id="bc-deskripsi" rows="3">${editData?.deskripsi||''}</textarea></div>
      <div id="bc-err" class="hidden text-[13px] text-white bg-[var(--bad)] rounded-lg px-3 py-2"></div>
      <button type="submit" class="btn-primary w-full">${isEdit?'Simpan Perubahan':'Simpan Kejadian Bencana'}</button>
    </form>`);
  overlay.querySelector('[data-close]').addEventListener('click', ()=>overlay.remove());

  async function loadSegmenOptions(ruasId, selectedSegId){
    const sel = overlay.querySelector('#bc-segmen');
    if(!ruasId){ sel.innerHTML = `<option value="">Pilih ruas terlebih dahulu…</option>`; return; }
    sel.innerHTML = `<option value="">Memuat…</option>`;
    try{
      const segs = await api.segmenByRuas(ruasId);
      const noneOpt = `<option value="">— Tanpa segmen (langsung ke ruas) —</option>`;
      sel.innerHTML = noneOpt + (segs.length? segs.map(s=>`<option value="${s.id}" ${selectedSegId===s.id?'selected':''}>${s.kode_segmen||'Segmen'} (STA ${fmtNum(s.sta_awal,3)}–${fmtNum(s.sta_akhir,3)})</option>`).join('') : '');
    }catch(e){ sel.innerHTML = `<option value="">Gagal memuat segmen</option>`; }
  }
  overlay.querySelector('#bc-ruas').addEventListener('change', (e)=>loadSegmenOptions(e.target.value, null));
  if(editData){
    const ruasId = editData.ruas_id || null;
    if(ruasId){ overlay.querySelector('#bc-ruas').value = ruasId; loadSegmenOptions(ruasId, editData.segmen_id); }
  } else if(presetRuasId){
    const ruasSel = overlay.querySelector('#bc-ruas');
    ruasSel.value = presetRuasId;
    ruasSel.disabled = true;
    loadSegmenOptions(presetRuasId, null);
  }

  const getJenisKejadian = wireLainnyaOption(overlay.querySelector('#bc-jenis'), overlay.querySelector('#bc-jenis-lainnya'), {known:['longsor','banjir','abrasi','gempa','angin_kencang'], current: editData?.jenis_kejadian});

    e.preventDefault();
    const errBox = overlay.querySelector('#bc-err');
    const ruasId = overlay.querySelector('#bc-ruas').value;
    const payload = {
      ruas_id: ruasId || null,
      segmen_id: overlay.querySelector('#bc-segmen').value || null,

      tingkat_kerusakan: overlay.querySelector('#bc-tingkat').value || null,
      deskripsi: overlay.querySelector('#bc-deskripsi').value || null,
    };
    if(!ruasId){ errBox.textContent = 'Pilih ruas terlebih dahulu.'; errBox.classList.remove('hidden'); return; }
    try{
      if(isEdit){ await api.updateBencana(editData.id, payload); }
      else{ payload.created_by = state.user.id; await api.insertBencana(payload); }
      overlay.remove();
      if(onSaved) onSaved(); else viewBencana();
    }catch(err){ errBox.textContent = err.message; errBox.classList.remove('hidden'); }
  });
}

// --- 11e. VIEW: KEGIATAN PENANGANAN (menu baru) ----------------------------
async function viewKegiatan(){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="skel h-10 w-full mb-4"></div><div class="skel h-96 w-full"></div>`;
  try{
    const [kegiatan, ruas] = await Promise.all([api.kegiatanList(), api.ruasList()]);
    state.ruasCache = ruas;
    v.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-3 mb-5">
      <div><h1 class="font-display font-extrabold text-2xl text-ink-900">Kegiatan Penanganan</h1>
      <p class="text-ink-500 text-[13.5px]">${kegiatan.length} kegiatan tercatat, terhubung langsung ke master ruas jalan</p></div>
      ${isEditor()?`<button id="btn-add-kegiatan" class="btn-accent">+ Tambah Kegiatan Penanganan</button>`:''}
    </div>
    <div class="flex flex-wrap gap-3 mb-4">
      <input id="fk-search" placeholder="Cari ruas / sub kegiatan…" class="max-w-xs">
      <select id="fk-jenis" class="max-w-[200px]"><option value="">Semua Jenis</option>${JENIS_PENANGANAN_OPT.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
      <select id="fk-status" class="max-w-[180px]"><option value="">Semua Status</option>${STATUS_PEKERJAAN_OPT.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select>
    </div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Foto</th><th>Ruas</th><th>Jenis</th><th>Sub Kegiatan</th><th>Tanggal</th><th>Biaya</th><th>Status</th>${isEditor()?'<th>Aksi</th>':''}</tr></thead>
      <tbody id="kegiatan-tbody"></tbody></table>
    </div>
    <div id="kegiatan-empty" class="hidden card p-8 text-center text-ink-400 text-[13.5px] mt-3">Belum ada kegiatan penanganan yang tercatat.</div>`;

    function renderRows(){
      const q = document.getElementById('fk-search').value.toLowerCase();
      const jenis = document.getElementById('fk-jenis').value;
      const status = document.getElementById('fk-status').value;
      const rows = kegiatan.filter(k=>{
        if(q && !((k.nama_ruas||'').toLowerCase().includes(q) || (k.kode_ruas||'').toLowerCase().includes(q) || (k.sub_kegiatan||'').toLowerCase().includes(q))) return false;
        if(jenis && k.jenis_penanganan!==jenis) return false;
        if(status && k.status_pekerjaan!==status) return false;
        return true;
      });
      const tbody = document.getElementById('kegiatan-tbody');
      tbody.innerHTML = rows.map(k=>`
        <tr class="row-hover" data-id="${k.id}">
          <td>${fotoThumbHtml(k.foto_awal_path || k.foto_akhir_path)}</td>
          <td><span class="font-mono text-[12px] text-navy-700 font-semibold">${k.kode_ruas}</span><div class="text-[12.5px]">${k.nama_ruas}</div></td>
          <td class="capitalize">${(k.jenis_penanganan||'—').replaceAll('_',' ')}${k.kejadian_bencana_id?` <span class="text-[var(--bad)]" title="Menangani kejadian bencana: ${(k.bencana_jenis_kejadian||'—').replaceAll('_',' ')} · ${fmtDate(k.bencana_tanggal_kejadian)}">⚠</span>`:''}</td>

async function renderDokDetail(kegiatanId, kegiatan){
  const box = document.getElementById('dok-detail');
  if(!box) return;
  box.innerHTML = `<div class="skel h-72 w-full"></div>`;
  try{
    const rows = await api.dokumenMatrix(kegiatanId);
    const done = rows.filter(r=>r.status==='sudah').length;
    const byTahap = {};
    rows.forEach(r=>{ (byTahap[r.tahap_urutan] ||= {nama:r.tahap_nama, items:[]}).items.push(r); });
    const tahapKeys = Object.keys(byTahap).sort((a,b)=>a-b);
    box.innerHTML = `
    <div class="card p-4 mb-4">
      <div class="text-[11.5px] font-mono text-ink-400">${fmtDate(kegiatan?.tanggal_penanganan)}</div>
      <div class="font-display font-bold text-[16px]">${kegiatan?.kode_ruas||''} — ${kegiatan?.nama_ruas||''}</div>
      <div class="text-[12.5px] text-ink-500 capitalize">${(kegiatan?.jenis_penanganan||'').replaceAll('_',' ')}${kegiatan?.sub_kegiatan?' · '+kegiatan.sub_kegiatan:''}</div>
      <div class="text-[11.5px] text-ink-400 mt-1 font-mono">${done}/${rows.length} dokumen lengkap</div>
    </div>
    <div class="flex gap-4 overflow-x-auto pb-2">
      ${tahapKeys.map(tk=>{
        const t = byTahap[tk];
        const tdone = t.items.filter(i=>i.status==='sudah').length;
        return `<div class="card p-4 shrink-0" style="width:260px">
          <div class="text-[11px] font-bold uppercase tracking-wide text-navy-700">TAHAP ${tk}</div>
          <div class="text-[12.5px] font-semibold text-ink-800 mb-1">${t.nama}</div>
          <div class="text-[11px] text-ink-400 font-mono mb-3">${tdone}/${t.items.length}</div>
          <div class="space-y-3">
            ${t.items.map(it=>`
              <div data-dokid="${it.dokumen_id}">
                <div class="text-[12.5px] font-medium ${it.status==='sudah'?'text-ink-900':'text-ink-600'}">${it.nama_dokumen}${it.wajib===false?' <span class="text-ink-400">(opsional)</span>':''}</div>
                ${it.status==='sudah' ? `
                  <div class="flex items-center flex-wrap gap-2 mt-1">
                    <span class="badge badge-baik">Lengkap</span>
                    ${it.link_dokumen?`<a href="${it.link_dokumen}" target="_blank" class="text-[11.5px] text-navy-700 underline">Buka</a>`:''}
                    ${isEditor()?`<button data-act="undo" class="text-[11px] text-ink-400 hover:text-[var(--bad)]">Batalkan</button>`:''}
                  </div>` : (isEditor()? `<button data-act="tambah" class="mt-1 w-full text-[12px] text-ink-400 border border-dashed border-line rounded-lg py-1.5 hover:border-navy-600 hover:text-navy-700">+ Tambah</button>` : `<div class="text-[11px] text-ink-400 mt-1">Belum ada</div>`)}
              </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
    if(isEditor()){
      box.querySelectorAll('[data-act="tambah"]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const wrap = btn.closest('[data-dokid]');
          const dokId = wrap.dataset.dokid;
          btn.outerHTML = `
            <div class="flex gap-1.5 mt-1">
              <input data-link-input placeholder="Link dokumen (opsional)" class="!text-[11.5px] !py-1">
              <button data-act="save" class="btn-primary !py-1 !px-2.5 !text-[11.5px]">OK</button>
            </div>`;
          wrap.querySelector('[data-act="save"]').addEventListener('click', async ()=>{
            const link = wrap.querySelector('[data-link-input]').value || null;
            try{
              await api.updateDokumen(dokId, {status:'sudah', link_dokumen:link, tanggal_update:new Date().toISOString(), uploaded_by:state.user.id});
              renderDokDetail(kegiatanId, kegiatan);
            }catch(err){ alert('Gagal menyimpan: '+err.message); }
          });
        });
      });
      box.querySelectorAll('[data-act="undo"]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const dokId = btn.closest('[data-dokid]').dataset.dokid;
          try{ await api.updateDokumen(dokId, {status:'belum'}); renderDokDetail(kegiatanId, kegiatan); }
          catch(err){ alert('Gagal memperbarui: '+err.message); }
        });
      });
    }
  }catch(err){ box.innerHTML = errorPanel(err); }
}

// --- 14. VIEW: ADMIN (Pengguna) -------------------------------------------
async function viewAdmin(){
  const v = document.getElementById('view');
  if(!isAdmin()){ v.innerHTML = `<div class="card p-8 text-center text-ink-400">Halaman ini khusus administrator.</div>`; return; }
  v.innerHTML = `<div class="skel h-96 w-full"></div>`;
  try{
    const profiles = await api.profiles();
    v.innerHTML = `
    <div class="mb-5"><h1 class="font-display font-extrabold text-2xl text-ink-900">Manajemen Pengguna</h1>
    <p class="text-ink-500 text-[13.5px]">Kelola peran akses seluruh pengguna sistem</p></div>
    <div class="card overflow-x-auto">
      <table><thead><tr><th>Nama</th><th>NIP</th><th>Wilayah</th><th>Peran</th></tr></thead>
      <tbody>${profiles.map(p=>`
        <tr><td class="font-medium">${p.nama}${p.id===state.user.id?' <span class="text-[11px] text-ink-400">(Anda)</span>':''}</td>
        <td class="font-mono text-[12.5px] text-ink-500">${p.nip||'—'}</td>
        <td class="text-ink-500">${p.kabupaten?.nama||'Seluruh Provinsi'}</td>
        <td><select data-id="${p.id}" class="role-select max-w-[180px]" ${p.id===state.user.id?'disabled':''}>
          ${Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join('')}
        </select></td></tr>`).join('')}
      </tbody></table>
    </div>`;
    v.querySelectorAll('.role-select').forEach(sel=>sel.addEventListener('change', async ()=>{
      try{ await api.updateRole(sel.dataset.id, sel.value); }
      catch(err){ alert('Gagal memperbarui peran: '+err.message); }
    }));
  }catch(err){ v.innerHTML = errorPanel(err); }
}
